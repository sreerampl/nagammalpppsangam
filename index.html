// --- Audit Log ---
const logAudit = async (action, module, details, userEmail, isDemo, setAuditLog) => {
  const entry = {
    Timestamp: now(),
    User: userEmail || "unknown",
    Action: action,
    Module: module,
    Details: details,
  };
  // In demo mode, log locally. In real mode, backend writes audit on every action automatically.
  if (isDemo) {
    setAuditLog((prev) => [entry, ...prev]);
  }
  return entry;
};

// --- Apps Script Backend Helper ---
class AppBackend {
  constructor(userEmail) {
    this.userEmail = userEmail;
    this.url = APPS_SCRIPT_URL;
  }

  async post(action, data = {}) {
    const res = await fetch(this.url, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action, data, userEmail: this.userEmail }),
    });
    if (!res.ok) throw new Error(`Backend error: ${res.status}`);
    const result = await res.json();
    if (!result.success) throw new Error(result.error || "Unknown error");
    return result.data;
  }

  async loadAll() {
    return this.post("loadAll");
  }

  async checkAccess() {
    return this.post("checkAccess");
  }
}

// ============================================================
// MAIN APP COMPONENT
// ============================================================
function App() {
  // Auth state
  const [user, setUser] = useState(null); // { email, name, picture, token }
  const [role, setRole] = useState(null); // Admin | Editor | Viewer | null
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lang, setLang] = useState("en"); // "en" or "ta"

  // Data state
  const [families, setFamilies] = useState([]);
  const [donations, setDonations] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [auction, setAuction] = useState([]);
  const [accessList, setAccessList] = useState([]);
  const [auditLog, setAuditLog] = useState([]);

  // UI state
  const [activeTab, setActiveTab] = useState("dashboard");
  const [showForm, setShowForm] = useState(null);
  const [toast, setToast] = useState(null);
  const [currentYear] = useState(new Date().getFullYear());

  const backendRef = useRef(null);

  // Audit helper
  const audit = (action, module, details) =>
    logAudit(action, module, details, user?.email, isDemo, setAuditLog);

  // --- Toast ---
  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);

  // --- Demo login ---
  useEffect(() => {
    if (IS_DEMO) {
      // Auto-login as admin in demo mode
      setUser({
        email: "admin@example.com",
        name: "Demo Admin",
        picture: "",
        token: null,
      });
      setRole("Admin");
      const mock = createMockData();
      setFamilies(mock.families);
      setDonations(mock.donations);
      setExpenses(mock.expenses);
      setAuction(mock.auction);
      setAccessList(mock.access);
      setAuditLog([{ Timestamp: now(), User: "admin@example.com", Action: "LOGIN", Module: "Auth", Details: "Demo Admin logged in" }]);
      setLoading(false);
    }
  }, []);

  // --- Google Sign-In (real mode) ---
  const googleReadyRef = useRef(false);
  
  const initGoogle = useCallback(() => {
    if (window.google && window.google.accounts) {
      window.google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleLogin,
        auto_select: false,
        use_fedcm_for_prompt: false,
      });
      googleReadyRef.current = true;
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    if (IS_DEMO) return;
    if (window.google && window.google.accounts) {
      initGoogle();
      return;
    }
    const interval = setInterval(() => {
      if (window.google && window.google.accounts) {
        clearInterval(interval);
        initGoogle();
      }
    }, 200);
    setTimeout(() => { clearInterval(interval); setLoading(false); }, 10000);
    return () => clearInterval(interval);
  }, []);

  const handleSignInClick = () => {
    if (!googleReadyRef.current) {
      alert("Google Sign-In is still loading. Please wait a moment and try again.");
      return;
    }
    // Method 1: Try prompt (One Tap)
    window.google.accounts.id.prompt((notification) => {
      if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
        // Method 2: Fall back to renderButton in a popup
        const btnDiv = document.getElementById("google-signin-btn-hidden");
        if (btnDiv) {
          btnDiv.innerHTML = "";
          window.google.accounts.id.renderButton(btnDiv, {
            theme: "outline", size: "large", width: 300, text: "signin_with",
          });
          // Click the rendered button
          setTimeout(() => {
            const gBtn = btnDiv.querySelector('[role="button"]') || btnDiv.querySelector('div[style]');
            if (gBtn) gBtn.click();
          }, 300);
        }
      }
    });
  };

  const handleGoogleLogin = async (response) => {
    try {
      const payload = JSON.parse(atob(response.credential.split(".")[1]));
      const u = {
        email: payload.email,
        name: payload.name,
        picture: payload.picture,
        token: response.credential,
      };
      setUser(u);
      backendRef.current = new AppBackend(u.email);
      await loadAllData(u.email);
    } catch (e) {
      setError("Login failed: " + e.message);
    }
  };

  const loadAllData = async (email) => {
    try {
      setLoading(true);
      const api = backendRef.current;
      const result = await api.loadAll();
      setFamilies(result.families || []);
      setDonations(result.income || []);
      setExpenses(result.expenses || []);
      setAuction(result.auction || []);
      setAccessList(result.access || []);
      if (result.auditLog) setAuditLog(result.auditLog.reverse());
      setRole(result.role || null);
    } catch (e) {
      setError("Failed to load data: " + e.message);
    } finally {
      setLoading(false);
    }
  };

  const handleDemoRoleSwitch = (newRole) => {
    const emailMap = { Admin: "admin@example.com", Editor: "editor@example.com", Viewer: "viewer@example.com" };
    setRole(newRole);
    setUser({ email: emailMap[newRole], name: `Demo ${newRole}`, picture: "", token: null });
  };

  const logout = () => {
    audit("LOGOUT", "Auth", `${user?.name || user?.email} logged out`);
    setUser(null);
    setRole(null);
    setActiveTab("dashboard");
  };

  // --- Data operations (local for demo, Apps Script for real) ---
  const addDonation = async (donation) => {
    const row = {
      TxnID: generateId("DON"),
      Date: donation.date,
      Day: donation.day,
      DonorType: donation.donorType,
      FamilyID: donation.familyId || "",
      DonorName: donation.donorName,
      Category: donation.category,
      Amount: donation.amount,
      Description: donation.description || "",
      EnteredBy: user.email,
      Timestamp: now(),
    };
    if (!IS_DEMO) {
      await backendRef.current.post("addIncome", donation);
    }
    setDonations((prev) => [...prev, row]);

    // Auto-add to auction if category is "Objects for Auction"
    if (donation.category === "Objects for Auction" && donation.description) {
      const auctionRow = {
        ItemNo: String(auction.length + 1),
        ItemDescription: donation.description,
        DonatedBy: donation.donorName,
        WinnerFamilyID: "",
        WinnerName: "",
        BidAmount: "",
        EnteredBy1: "",
        ConfirmedBy2: "",
        Timestamp1: "",
        Timestamp2: "",
        Status: "",
      };
      // Backend already handles auction auto-add
      setAuction((prev) => [...prev, auctionRow]);
    }

    showToast(t("toastDonation", lang));
    audit("CREATE", "Income", `${row.TxnID} ₹${row.Amount} ${row.Category} by ${row.DonorName}`);
    if (donation.category === "Objects for Auction" && donation.description) {
      audit("CREATE", "Auction", `Auto-added "${donation.description}" from income by ${donation.donorName}`);
    }
    setShowForm(null);
  };

  const addAuctionItem = async (item) => {
    const row = {
      ItemNo: String(auction.length + 1),
      ItemDescription: item.itemName,
      DonatedBy: item.donatedBy || "",
      WinnerFamilyID: "",
      WinnerName: "",
      BidAmount: "",
      EnteredBy1: "",
      ConfirmedBy2: "",
      Timestamp1: "",
      Timestamp2: "",
      Status: "",
    };
    if (!IS_DEMO) {
      await backendRef.current.post("addAuctionItem", item);
    }
    setAuction((prev) => [...prev, row]);
    showToast(t("toastItemAdded", lang));
    audit("CREATE", "Auction", `Manual add #${row.ItemNo} "${item.itemName}"${item.donatedBy ? ` by ${item.donatedBy}` : ""}`);
    setShowForm(null);
  };

  const addExpense = async (expense) => {
    const row = {
      TxnID: generateId("EXP"),
      Date: expense.date,
      Day: expense.day,
      Category: expense.category,
      Description: expense.description,
      Amount: expense.amount,
      Vendor: expense.vendor || "",
      EnteredBy: user.email,
      Timestamp: now(),
    };
    if (!IS_DEMO) {
      await backendRef.current.post("addExpense", expense);
    }
    setExpenses((prev) => [...prev, row]);
    showToast(t("toastExpense", lang));
    audit("CREATE", "Expenses", `${row.TxnID} ₹${row.Amount} ${row.Category} - ${row.Description}`);
    setShowForm(null);
  };

  const addFamily = async (family) => {
    const row = {
      FamilyID: generateId("FAM"),
      HeadOfFamily: family.headOfFamily,
      Phone: family.phone,
      WhatsApp: family.whatsApp || "",
      Address: family.address,
    };
    if (!IS_DEMO) {
      await backendRef.current.post("addFamily", family);
    }
    setFamilies((prev) => [...prev, row]);
    showToast(t("toastFamily", lang));
    audit("CREATE", "Families", `${row.FamilyID} ${row.HeadOfFamily}`);
    setShowForm(null);
  };

  const enterAuctionBid = async (itemIndex, bid) => {
    const updated = [...auction];
    const item = { ...updated[itemIndex] };
    if (!item.EnteredBy1 || item.EnteredBy1 === "") {
      // First entry
      item.WinnerFamilyID = bid.familyId;
      item.WinnerName = bid.winnerName;
      item.BidAmount = bid.amount;
      item.EnteredBy1 = user.email;
      item.Timestamp1 = now();
      item.Status = "Pending";
    } else if (item.EnteredBy1 !== user.email && (!item.ConfirmedBy2 || item.ConfirmedBy2 === "")) {
      // Second person confirms
      item.ConfirmedBy2 = user.email;
      item.Timestamp2 = now();
      item.Status = "Confirmed";
    } else {
      showToast(t("toastBidSelfError", lang), "error");
      return;
    }
    updated[itemIndex] = item;
    if (!IS_DEMO) {
      await backendRef.current.post("enterBid", { ...bid, rowIndex: itemIndex });
    }
    setAuction(updated);
    if (item.Status === "Confirmed") {
      showToast(t("toastBidConfirm", lang));
      audit("CONFIRM", "Auction", `#${item.ItemNo} "${item.ItemDescription}" ₹${item.BidAmount} to ${item.WinnerName}`);
    } else {
      showToast(t("toastBidSubmit", lang));
      audit("BID", "Auction", `#${item.ItemNo} "${item.ItemDescription}" ₹${bid.amount} by ${bid.winnerName}`);
    }
  };

  // --- Computed values ---
  const totalDonations = donations.reduce((s, d) => s + Number(d.Amount || 0), 0);
  const totalExpenses = expenses.reduce((s, e) => s + Number(e.Amount || 0), 0);
  const totalAuction = auction
    .filter((a) => a.Status === "Confirmed")
    .reduce((s, a) => s + Number(a.BidAmount || 0), 0);
  const balance = totalDonations + totalAuction - totalExpenses;

  const canEdit = role === "Admin" || role === "Editor";
  const isAdmin = role === "Admin";

  // ============================================================
  // RENDER
  // ============================================================

  if (loading) return <LangContext.Provider value={lang}><LoadingScreen /></LangContext.Provider>;
  if (!user) return <LangContext.Provider value={lang}><LoginScreen lang={lang} setLang={setLang} onDemoLogin={() => {
    setUser({ email: "admin@example.com", name: "Demo Admin", picture: "", token: null });
    setRole("Admin");
    const mock = createMockData();
    setFamilies(mock.families);
    setDonations(mock.donations);
    setExpenses(mock.expenses);
    setAuction(mock.auction);
    setAccessList(mock.access);
  }} /></LangContext.Provider>;
  if (!role) return <LangContext.Provider value={lang}><NoAccessScreen email={user.email} onLogout={logout} /></LangContext.Provider>;

  return (
    <LangContext.Provider value={lang}>
    <div style={styles.app}>
      {/* Header */}
      <header style={styles.header}>
        <div style={styles.headerInner}>
          <div style={styles.headerLeft}>
            <div style={styles.logo}>🪔</div>
            <div>
              <h1 style={styles.headerTitle}>{t("appTitle", lang)}</h1>
              <p style={styles.headerSubtitle}>{t("appSubtitle", lang === "ta" ? "en" : "ta")} · {currentYear}</p>
            </div>
          </div>
          <div style={styles.headerRight}>
            {/* Language Toggle */}
            <button
              onClick={() => setLang(lang === "en" ? "ta" : "en")}
              style={styles.langToggle}
              title={lang === "en" ? "Switch to Tamil" : "Switch to English"}
            >
              {lang === "en" ? "தமிழ்" : "ENG"}
            </button>
            <div style={styles.userBadge}>
              <span style={styles.rolePill}>{role}</span>
              <span style={styles.userName}>{user.name?.split(" ")[0]}</span>
            </div>
            <button onClick={logout} style={styles.logoutBtn}>↗</button>
          </div>
        </div>
        {IS_DEMO && (
          <div style={styles.demoBanner}>
            <span>{t("demoMode", lang)} </span>
            {["Admin", "Editor", "Viewer"].map((r) => (
              <button
                key={r}
                onClick={() => handleDemoRoleSwitch(r)}
                style={{
                  ...styles.demoRoleBtn,
                  background: role === r ? "#fff" : "transparent",
                  color: role === r ? "#b45309" : "#fff",
                }}
              >
                {r}
              </button>
            ))}
          </div>
        )}
      </header>

      {/* Toast */}
      {toast && (
        <div style={{
          ...styles.toast,
          background: toast.type === "error" ? "#dc2626" : "#059669",
        }}>
          {toast.msg}
        </div>
      )}

      {/* Main Content */}
      <main style={styles.main}>
        {activeTab === "dashboard" && (
          <Dashboard
            totalDonations={totalDonations}
            totalExpenses={totalExpenses}
            totalAuction={totalAuction}
            balance={balance}
            donations={donations}
            expenses={expenses}
            auction={auction}
            families={families}
          />
        )}
        {activeTab === "donations" && (
          <DonationsView
            donations={donations}
            families={families}
            canEdit={canEdit}
            onAdd={() => setShowForm("donation")}
          />
        )}
        {activeTab === "expenses" && (
          <ExpensesView
            expenses={expenses}
            canEdit={canEdit}
            onAdd={() => setShowForm("expense")}
          />
        )}
        {activeTab === "auction" && (
          <AuctionView
            auction={auction}
            families={families}
            canEdit={canEdit}
            isAdmin={isAdmin}
            userEmail={user.email}
            onBid={enterAuctionBid}
            onAddItem={() => setShowForm("auctionItem")}
          />
        )}
        {activeTab === "families" && (
          <FamiliesView
            families={families}
            isAdmin={isAdmin}
            canEdit={canEdit}
            onAdd={() => setShowForm("family")}
          />
        )}
        {activeTab === "reports" && (
          <ReportsView
            families={families}
            donations={donations}
            expenses={expenses}
            auction={auction}
            totalDonations={totalDonations}
            totalExpenses={totalExpenses}
            totalAuction={totalAuction}
            balance={balance}
          />
        )}
        {activeTab === "auditlog" && isAdmin && (
          <AuditLogView entries={auditLog} />
        )}
      </main>

      {/* Forms (Modal) */}
      {showForm === "donation" && (
        <DonationForm
          families={families}
          onSubmit={addDonation}
          onClose={() => setShowForm(null)}
        />
      )}
      {showForm === "expense" && (
        <ExpenseForm
          onSubmit={addExpense}
          onClose={() => setShowForm(null)}
        />
      )}
      {showForm === "family" && (
        <FamilyForm
          onSubmit={addFamily}
          onClose={() => setShowForm(null)}
        />
      )}
      {showForm === "auctionItem" && (
        <AuctionItemForm
          onSubmit={addAuctionItem}
          onClose={() => setShowForm(null)}
        />
      )}

      {/* Bottom Nav */}
      <nav style={styles.nav}>
        {[
          { id: "dashboard", icon: "📊", label: t("navHome", lang) },
          { id: "donations", icon: "💰", label: t("navDonate", lang) },
          { id: "expenses", icon: "💸", label: t("navExpense", lang) },
          { id: "auction", icon: "🔨", label: t("navAuction", lang) },
          { id: "families", icon: "👨‍👩‍👧‍👦", label: t("navFamily", lang) },
          { id: "reports", icon: "📋", label: t("navReports", lang) },
          ...(isAdmin ? [{ id: "auditlog", icon: "📜", label: t("navAuditLog", lang) }] : []),
        ].map((tab) => (
          <button
            key={tab.id}
            onClick={() => setActiveTab(tab.id)}
            style={{
              ...styles.navBtn,
              color: activeTab === tab.id ? "#b45309" : "#78716c",
              borderTop: activeTab === tab.id ? "3px solid #b45309" : "3px solid transparent",
            }}
          >
            <span style={{ fontSize: 20 }}>{tab.icon}</span>
            <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: 0.5 }}>{tab.label}</span>
          </button>
        ))}
      </nav>

      {/* Setup Instructions (shown once in demo) */}
      {IS_DEMO && activeTab === "dashboard" && <SetupInstructions />}
    </div>
    </LangContext.Provider>
  );
}

function LoadingScreen() {
  const lang = useLang();
  return (
    <div style={styles.centerScreen}>
      <div style={styles.spinner} />
      <p style={{ color: "#78716c", marginTop: 16, fontFamily: "'Cormorant Garamond', serif" }}>
        {t("loading", lang)}
      </p>
    </div>
  );
}

function LoginScreen({ onDemoLogin, lang, setLang }) {
  useEffect(() => {
    if (IS_DEMO) return;
    const tryRender = () => {
      const el = document.getElementById("g-signin-btn");
      if (el && window.google && window.google.accounts) {
        window.google.accounts.id.renderButton(el, {
          theme: "outline",
          size: "large",
          width: 300,
          text: "signin_with",
          shape: "rectangular",
        });
      }
    };
    tryRender();
    const interval = setInterval(tryRender, 500);
    setTimeout(() => clearInterval(interval), 10000);
    return () => clearInterval(interval);
  }, []);
  return (
    <div style={styles.loginScreen}>
      <div style={styles.loginCard}>
        {/* Language toggle on login */}
        <button
          onClick={() => setLang(lang === "en" ? "ta" : "en")}

        <div style={{ fontSize: 64, marginBottom: 8 }}>🪔</div>
        <h1 style={styles.loginTitle}>குடும்ப பிரார்த்தனை</h1>

          const dayDonTotal = dayDon.reduce((s, d) => s + Number(d.Amount || 0), 0);
          const dayExpTotal = dayExp.reduce((s, e) => s + Number(e.Amount || 0), 0);
          return (
            <div key={day} style={styles.dayCard}>

      <h3 style={styles.sectionTitle}>{t("recentTxns", lang)}</h3>
      <div style={styles.recentList}>
        {[...donations.map((d) => ({ ...d, _type: "donation" })),
        ...expenses.map((e) => ({ ...e, _type: "expense" }))]

                ...styles.recentIcon,

                ...styles.recentAmount,

      </div>
    </div>
  );
}

function AuctionView({ auction, families, canEdit, isAdmin, userEmail, onBid, onAddItem }) {
  const lang = useLang();
  const [selectedItem, setSelectedItem] = useState(null);
  const [bidForm, setBidForm] = useState({ bidderType: "Family", familyId: "", winnerName: "", amount: "" });
  const [filterStatus, setFilterStatus] = useState("All");

  const filtered = filterStatus === "All"
    ? auction
    : filterStatus === "Unsold"
      ? auction.filter((a) => !a.Status)
      : auction.filter((a) => a.Status === filterStatus);

  const handleSubmitBid = (index) => {
    if (!bidForm.amount || !bidForm.winnerName) return;
    onBid(index, bidForm);
    setSelectedItem(null);
    setBidForm({ bidderType: "Family", familyId: "", winnerName: "", amount: "" });
  };

  const statusLabels = { All: t("filterAll", lang), Unsold: t("filterUnsold", lang), Pending: t("filterPending", lang), Confirmed: t("filterConfirmed", lang) };

  return (
    <div style={styles.page}>
      <div style={styles.pageHeader}>
        <h2 style={styles.pageTitle}>{t("auctionTitle", lang)} ({auction.length} {t("itemsCount", lang)})</h2>
        {isAdmin && (
          <button onClick={onAddItem} style={styles.addBtn}>{t("addItem", lang)}</button>
        )}
      </div>

      <div style={styles.filterRow}>
        {["All", "Unsold", "Pending", "Confirmed"].map((s) => (
          <button
            key={s}
            onClick={() => setFilterStatus(s)}
            style={{
              ...styles.filterPill,
              background: filterStatus === s ? "#292524" : "#f5f5f4",
              color: filterStatus === s ? "#fff" : "#57534e",
            }}
          >
            {statusLabels[s]}
          </button>
        ))}
      </div>

      <div style={styles.auctionInfo}>
        <span>🔐 Dual-entry required: Two different people must enter/confirm each bid.</span>
      </div>

      <div style={styles.txnList}>
        {filtered.map((item, i) => {
          const realIndex = auction.indexOf(item);
          const isPending = item.Status === "Pending";
          const isConfirmed = item.Status === "Confirmed";
          const isUnsold = !item.Status;
          const canConfirm = isPending && item.EnteredBy1 !== userEmail && canEdit;

          return (
            <div key={i} style={{
              ...styles.auctionCard,
              borderLeft: `4px solid ${isConfirmed ? "#059669" : isPending ? "#f59e0b" : "#d6d3d1"}`,
            }}>
              <div style={styles.txnTop}>
                <div>
                  <p style={styles.auctionItemNo}>#{item.ItemNo}</p>
                  <p style={styles.txnName}>{item.ItemDescription}</p>
                  {item.DonatedBy && <p style={styles.txnMeta}>{t("donatedBy", lang)}: {item.DonatedBy}</p>}
                </div>
                <div style={{ textAlign: "right" }}>
                  {item.BidAmount ? (
                    <p style={{ ...styles.txnAmount, color: "#059669" }}>{formatCurrency(item.BidAmount)}</p>
                  ) : (
                    <span style={styles.unsoldBadge}>Unsold</span>
                  )}
                  {item.Status && (
                    <span style={{
                      ...styles.statusBadge,
                      background: isConfirmed ? "#d1fae5" : "#fef3c7",
                      color: isConfirmed ? "#065f46" : "#92400e",
                    }}>
                      {item.Status}
                    </span>
                  )}
                </div>
              </div>

              {isPending && (
                <p style={styles.txnMeta}>
                  {t("enteredBy", lang)}: {item.EnteredBy1} · {item.WinnerName}
                  {item.WinnerFamilyID ? ` (${item.WinnerFamilyID})` : ` (${t("external", lang)})`}
                </p>
              )}
              {isConfirmed && (
                <p style={styles.txnMeta}>
                  {t("winner", lang)}: {item.WinnerName}
                  {item.WinnerFamilyID ? ` (${item.WinnerFamilyID})` : ` (${t("external", lang)})`} · ✓ {t("filterConfirmed", lang)}
                </p>
              )}

              {/* Action buttons */}
              {canEdit && isUnsold && (
                <button
                  onClick={() => { setSelectedItem(realIndex); setBidForm({ bidderType: "Family", familyId: "", winnerName: "", amount: "" }); }}
                  style={styles.bidBtn}
                >
                  Enter Bid
                </button>
              )}
              {canConfirm && (
                <button
                  onClick={() => onBid(realIndex, {
                    familyId: item.WinnerFamilyID,
                    winnerName: item.WinnerName,
                    amount: item.BidAmount,
                  })}
                  style={{ ...styles.bidBtn, background: "#059669" }}
                >
                  {t("confirmBid", lang)}
                </button>
              )}
              {isPending && item.EnteredBy1 === userEmail && (
                <p style={{ ...styles.txnMeta, color: "#b45309", fontStyle: "italic" }}>
                  {t("waitingConfirm", lang)}
                </p>
              )}

              {/* Bid entry form (inline) */}
              {selectedItem === realIndex && (
                <div style={styles.inlineBidForm}>
                  {/* Bidder type toggle */}
                  <div style={{ display: "flex", gap: 6 }}>
                    {["Family", "External"].map((tp) => (
                      <button
                        key={tp}
                        onClick={() => setBidForm({ ...bidForm, bidderType: tp, familyId: "", winnerName: "" })}
                        style={{
                          ...styles.filterPill,
                          flex: 1,
                          textAlign: "center",
                          background: bidForm.bidderType === tp ? "#292524" : "#f5f5f4",
                          color: bidForm.bidderType === tp ? "#fff" : "#57534e",
                          padding: "8px 12px",
                          fontSize: 12,
                        }}
                      >
                        {tp === "Family" ? t("bidFamily", lang) : t("bidExternal", lang)}
                      </button>
                    ))}
                  </div>

                  {/* Family selector (only for Family type) */}
                  {bidForm.bidderType === "Family" && (
                    <select
                      value={bidForm.familyId}
                      onChange={(e) => {
                        const fam = families.find((f) => f.FamilyID === e.target.value);
                        setBidForm({ ...bidForm, familyId: e.target.value, winnerName: fam?.HeadOfFamily || "" });
                      }}
                      style={styles.input}
                    >
                      <option value="">{t("selectFamily", lang)}</option>
                      {families.map((f) => (
                        <option key={f.FamilyID} value={f.FamilyID}>
                          {f.HeadOfFamily} ({f.FamilyID})
                        </option>
                      ))}
                    </select>
                  )}

                  <input
                    placeholder={bidForm.bidderType === "Family" ? t("winnerName", lang) : t("externalBidder", lang)}
                    value={bidForm.winnerName}
                    onChange={(e) => setBidForm({ ...bidForm, winnerName: e.target.value })}
                    style={styles.input}
                  />
                  <input
                    type="number"
                    placeholder={t("bidAmount", lang)}
                    value={bidForm.amount}
                    onChange={(e) => setBidForm({ ...bidForm, amount: e.target.value })}
                    style={styles.input}
                  />
                  <div style={{ display: "flex", gap: 8 }}>
                    <button
                      onClick={() => handleSubmitBid(realIndex)}
                      style={styles.btnPrimary}
                    >
                      {t("submitBid", lang)}
                    </button>
                    <button
                      onClick={() => setSelectedItem(null)}
                      style={styles.btnSecondary}
                    >
                      {t("cancel", lang)}
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// --- Auction Balance Sheet ---
function AuctionBalanceSheet({ auction, families, donations, expenses, totalDonations, totalExpenses, totalAuction, balance }) {
  const lang = useLang();
  const confirmedItems = auction.filter((a) => a.Status === "Confirmed");
  const pendingItems = auction.filter((a) => a.Status === "Pending");
  const unsoldItems = auction.filter((a) => !a.Status);
  const pendingTotal = pendingItems.reduce((s, a) => s + Number(a.BidAmount || 0), 0);

  // Group auction by family / external
  const bidderTotals = {};
  confirmedItems.forEach((item) => {
    const key = item.WinnerFamilyID || `EXT-${item.WinnerName}`;
    if (!bidderTotals[key]) {
      bidderTotals[key] = {
        name: item.WinnerName,
        isExternal: !item.WinnerFamilyID,
        items: 0,
        total: 0,
      };
    }
    bidderTotals[key].items += 1;
    bidderTotals[key].total += Number(item.BidAmount || 0);
  });

  return (
    <div>
      {/* Overall Event Summary */}
      <div style={styles.reportHeader}>
        <h3 style={styles.reportTitle}>{t("eventBalanceSheet", lang)}</h3>
      </div>

      <div style={styles.balanceSheet}>
        {/* Income side */}
        <div style={styles.bsSection}>
          <div style={styles.bsSectionHeader}>
            <span style={styles.bsSectionIcon}>↓</span>
            <span style={styles.bsSectionTitle}>{t("income", lang)}</span>
          </div>
          <div style={styles.bsRow}>
            <span>{t("donations", lang)}</span>
            <span style={styles.bsAmount}>{formatCurrency(totalDonations)}</span>
          </div>
          <div style={styles.bsRow}>
            <span>{t("auctionConfirmed", lang)}</span>
            <span style={styles.bsAmount}>{formatCurrency(totalAuction)}</span>
          </div>
          {pendingTotal > 0 && (
            <div style={{ ...styles.bsRow, color: "#b45309" }}>
              <span>{t("auctionPending", lang)}</span>
              <span style={styles.bsAmount}>{formatCurrency(pendingTotal)}</span>
            </div>
          )}
          <div style={styles.bsTotalRow}>
            <span>{t("totalIncome", lang)}</span>
            <span style={{ ...styles.bsAmount, fontWeight: 800 }}>
              {formatCurrency(totalDonations + totalAuction)}
            </span>
          </div>
        </div>

        {/* Expense side */}
        <div style={styles.bsSection}>
          <div style={styles.bsSectionHeader}>
            <span style={{ ...styles.bsSectionIcon, background: "#fee2e2", color: "#dc2626" }}>↑</span>
            <span style={styles.bsSectionTitle}>{t("expensesLabel", lang)}</span>
          </div>
          <div style={styles.bsRow}>
            <span>{t("totalExpenses", lang)}</span>
            <span style={styles.bsAmount}>{formatCurrency(totalExpenses)}</span>
          </div>
          <div style={styles.bsTotalRow}>
            <span>{t("totalOutflow", lang)}</span>
            <span style={{ ...styles.bsAmount, fontWeight: 800 }}>
              {formatCurrency(totalExpenses)}
            </span>
          </div>
        </div>

        {/* Net */}
        <div style={{
          ...styles.bsNetRow,
          background: balance >= 0
            ? "linear-gradient(135deg, #065f46, #059669)"
            : "linear-gradient(135deg, #991b1b, #dc2626)",
        }}>
          <span>{t("netBalanceLabel", lang)}</span>
          <span style={{ fontSize: 20, fontWeight: 800 }}>{formatCurrency(balance)}</span>
        </div>
      </div>

      {/* Auction Status Summary */}
      <div style={styles.reportHeader}>
        <h3 style={{...styles.reportTitle, marginTop: 24}}>{t("auctionSummary", lang)}</h3>
      </div>

      <div style={styles.auctionSummaryGrid}>
        <div style={{ ...styles.auctionSummaryCard, borderLeft: "4px solid #059669" }}>
          <p style={styles.asStat}>{confirmedItems.length}</p>
          <p style={styles.asLabel}>{t("confirmedLabel", lang)}</p>
          <p style={styles.asAmount}>{formatCurrency(totalAuction)}</p>
        </div>
        <div style={{ ...styles.auctionSummaryCard, borderLeft: "4px solid #f59e0b" }}>
          <p style={styles.asStat}>{pendingItems.length}</p>
          <p style={styles.asLabel}>{t("pendingLabel", lang)}</p>
          <p style={styles.asAmount}>{formatCurrency(pendingTotal)}</p>
        </div>
        <div style={{ ...styles.auctionSummaryCard, borderLeft: "4px solid #d6d3d1" }}>
          <p style={styles.asStat}>{unsoldItems.length}</p>
          <p style={styles.asLabel}>{t("unsoldLabel", lang)}</p>
          <p style={styles.asAmount}>—</p>
        </div>
      </div>

      {/* Auction by Bidder */}
      {Object.keys(bidderTotals).length > 0 && (
        <>
          <div style={styles.reportHeader}>
            <h3 style={{ ...styles.reportTitle, marginTop: 24 }}>{t("auctionByBidder", lang)}</h3>
          </div>
          <div style={styles.tableWrapper}>
            <table style={styles.table}>
              <thead>
                <tr>
                  <th style={styles.th}>{t("bidder", lang)}</th>
                  <th style={{ ...styles.th, textAlign: "center" }}>{t("itemsWon", lang)}</th>
                  <th style={{ ...styles.th, textAlign: "right" }}>{t("totalAmount", lang)}</th>
                </tr>
              </thead>
              <tbody>
                {Object.entries(bidderTotals)
                  .sort((a, b) => b[1].total - a[1].total)
                  .map(([key, data], i) => (
                    <tr key={i} style={i % 2 === 0 ? styles.trEven : styles.trOdd}>
                      <td style={styles.td}>
                        <p style={styles.tableName}>{data.name}</p>
                        <p style={styles.tableAddr}>
                          {data.isExternal ? t("bidExternal", lang) : `🏠 ${key}`}
                        </p>
                      </td>
                      <td style={{ ...styles.td, textAlign: "center", fontWeight: 700 }}>{data.items}</td>
                      <td style={{ ...styles.td, textAlign: "right", fontWeight: 700, color: "#059669" }}>
                        {formatCurrency(data.total)}
                      </td>
                    </tr>
                  ))}
                <tr style={styles.trTotal}>
                  <td style={{ ...styles.td, fontWeight: 800 }}>{t("total", lang).toUpperCase()}</td>
                  <td style={{ ...styles.td, textAlign: "center", fontWeight: 800 }}>
                    {confirmedItems.length}
                  </td>
                  <td style={{ ...styles.td, textAlign: "right", fontWeight: 800, color: "#059669" }}>
                    {formatCurrency(totalAuction)}
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* Auction Item-wise Detail */}
      {confirmedItems.length > 0 && (
        <>
          <div style={styles.reportHeader}>
            <h3 style={{ ...styles.reportTitle, marginTop: 24 }}>{t("auctionItemDetails", lang)}</h3>
          </div>
          <div style={styles.tableWrapper}>
            <table style={styles.table}>
              <thead>
                <tr>
                  <th style={{ ...styles.th, width: "10%" }}>#</th>
                  <th style={styles.th}>{t("item", lang)}</th>
                  <th style={styles.th}>{t("winner", lang)}</th>
                  <th style={{ ...styles.th, textAlign: "right" }}>{t("amount", lang)}</th>
                </tr>
              </thead>
              <tbody>
                {confirmedItems.map((item, i) => (
                  <tr key={i} style={i % 2 === 0 ? styles.trEven : styles.trOdd}>
                    <td style={{ ...styles.td, fontWeight: 700, color: "#b45309" }}>{item.ItemNo}</td>
                    <td style={styles.td}>{item.ItemDescription}</td>
                    <td style={styles.td}>
                      <p style={styles.tableName}>{item.WinnerName}</p>
                      <p style={styles.tableAddr}>
                        {item.WinnerFamilyID ? `🏠 ${item.WinnerFamilyID}` : t("bidExternal", lang)}
                      </p>
                    </td>
                    <td style={{ ...styles.td, textAlign: "right", fontWeight: 700, color: "#059669" }}>
                      {formatCurrency(item.BidAmount)}
                    </td>
                  </tr>
                ))}
                <tr style={styles.trTotal}>
                  <td style={styles.td}></td>
                  <td style={{ ...styles.td, fontWeight: 800 }}>{t("total", lang).toUpperCase()}</td>
                  <td style={styles.td}></td>
                  <td style={{ ...styles.td, textAlign: "right", fontWeight: 800, color: "#059669", fontSize: 15 }}>
                    {formatCurrency(totalAuction)}
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </>
      )}

      {pendingTotal > 0 && (
        <p style={{ ...styles.txnMeta, marginTop: 12, color: "#b45309", fontStyle: "italic" }}>
          {t("pendingDisclaimer", lang).replace("{amount}", formatCurrency(pendingTotal))}
        </p>
      )}
    </div>
  );
}
