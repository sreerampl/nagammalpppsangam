const calcDay = (dateStr, day1Date) => {
  if (!dateStr || !day1Date) return null;
  const d = new Date(dateStr), d1 = new Date(day1Date);
  const diff = Math.round((d - d1) / 86400000);
  if (diff === 0) return "1";
  if (diff === 1) return "2";
  if (diff === 2) return "3";
  return null; // Invalid — not an event day
};

// --- Photo Helper (compress & convert to base64) ---
function compressImage(file, maxWidth = 800, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// --- Apps Script Backend Helper ---
class AppBackend {
  constructor(email) {
    this.email = email;
    this.url = APPS_SCRIPT_URL;
  }

  async post(action, data = {}) {
    const res = await fetch(this.url, {
      method: "POST",
      body: JSON.stringify({ action, data, email: this.email }),
    });
    const text = await res.text();
    let result;
    try {
      result = JSON.parse(text);
    } catch(e) {
      console.error("Backend returned non-JSON:", text.substring(0, 200));
      throw new Error("Backend returned invalid response");
    }
    if (!result.success) throw new Error(result.error || "Unknown error");
    return result.data;
  }

  async loadAll() {
    return this.post("loadAll");
  }

}

    setBusy(true);
    try {
      await backendRef.current.post("saveEventConfig", config);
      // Update ledger state locally
      setLedger((prev) => {
        const exists = prev.findIndex((r) => String(r.Year) === String(config.year));
        if (exists >= 0) {
          const updated = [...prev];
          updated[exists] = { ...updated[exists], Day1: config.day1 };
          return updated;
        }
        return [...prev, { Year: config.year, Day1: config.day1 }];
      });
      showToast(t("eventConfigured", lang));
    } catch (e) {
      showToast("Error: " + e.message, "error");
    } finally {
      setBusy(false);
    }
  };

  // Seed standard 48 auction items for a year
  const seedAuctionItems = async (year) => {
    setBusy(true);
    try {
      const result = await backendRef.current.post("seedAuctionItems", { year });
      if (result.skipped) {
        // Items already exist — skip silently, just reload
      } else {
        showToast(result.count + " " + t("auctionSeeded", lang));
      }
      // Reload auction data
      const fresh = await backendRef.current.post("loadAll");
      if (fresh.auction) setAuction(fresh.auction);
    } catch (e) {
      showToast("Error: " + e.message, "error");
    } finally {
      setBusy(false);
    }
  };

  // --- Loan functions ---
  const addLoan = async (data) => {
    setBusy(true);
    try {
      const result = await backendRef.current.post("addLoan", data);
      const loanAmt = Number(data.loanAmount) || 0;
      const rate = Number(data.interestRate) || 9;
      const lastYrRec = result.lastYearReceivable || 0;
      const intOnLoan = Math.round(loanAmt * rate / 100);
      const intOnPrev = Math.round(lastYrRec * rate / 100);
      const intAmt = intOnLoan + intOnPrev;
      const row = {
        LoanID: result.loanId,
        Year: data.year || String(new Date().getFullYear()),
        FamilyID: data.familyId || "",
        FamilyName: data.familyName || "",
        LastYearReceivable: lastYrRec,
        LoanAmount: loanAmt,
        InterestRate: rate,
        InterestAmount: intAmt,
        TotalReceivable: lastYrRec + loanAmt + intAmt,
        ReceivedAmount: 0,
        RecStatus: "Pending",
        IssuedBy: user.email,
        IssuedDate: data.issuedDate || now(),
        ReceivedBy: "",
        ReceivedDate: "",
        Notes: data.notes || "",
      };
      setLoans((prev) => [...prev, row]);
      showToast(t("loanSaved", lang));
    } catch (e) {
      showToast("Error: " + e.message, "error");
    } finally {
      setBusy(false);
    }
  };

  const receiveLoan = async (data) => {
    setBusy(true);
    try {
      const result = await backendRef.current.post("receiveLoan", data);
      setLoans((prev) => prev.map((l) => {
        if (l.LoanID === data.loanId) {
          return { ...l, ReceivedAmount: result.receivedAmount, RecStatus: result.status, ReceivedBy: user.email, ReceivedDate: now() };
        }
        return l;
      }));
      showToast(t("loanPaymentSaved", lang));
    } catch (e) {
      showToast("Error: " + e.message, "error");
    } finally {
      setBusy(false);
    }
  };

  const editLoan = async (data) => {
    setBusy(true);
    try {
      await backendRef.current.post("editLoan", data);
      const loanAmt = Number(data.loanAmount) || 0;
      const rate = Number(data.interestRate) || 9;
      setLoans((prev) => prev.map((l) => {
        if (l.LoanID === data.loanId) {
          const lastYrRec = data.lastYearReceivable !== undefined && data.lastYearReceivable !== "" ? Number(data.lastYearReceivable) : Number(l.LastYearReceivable) || 0;
          const intOnLoan = Math.round(loanAmt * rate / 100);
          const intOnPrev = Math.round(lastYrRec * rate / 100);
          const intAmt = intOnLoan + intOnPrev;
          return { ...l, FamilyID: data.familyId || l.FamilyID, FamilyName: data.familyName || l.FamilyName, LastYearReceivable: lastYrRec, LoanAmount: loanAmt, InterestRate: rate, InterestAmount: intAmt, TotalReceivable: lastYrRec + loanAmt + intAmt, Notes: data.notes !== undefined ? data.notes : l.Notes };
        }
        return l;
      }));
      showToast(t("loanEdited", lang));
    } catch (e) {
      showToast("Error: " + e.message, "error");
    } finally {
      setBusy(false);
    }
  };

  const deleteLoan = async (loanId) => {
    setBusy(true);
    try {
      await backendRef.current.post("deleteLoan", { loanId });
      setLoans((prev) => prev.filter((l) => l.LoanID !== loanId));
      showToast(t("loanDeleted", lang));
    } catch (e) {
      showToast("Error: " + e.message, "error");
    } finally {
      setBusy(false);
    }
  };

  // --- Computed values (filtered by selected year) ---
  const yearStr = String(currentYear);
  const yearIncome = income.filter((d) => String(d.Year) === yearStr);
  const yearExpenses = expenses.filter((e) => String(e.Year) === yearStr);
  const yearLoans = loans.filter((l) => String(l.Year) === yearStr);
  const yearAuction = auction.filter((a) => String(a.Year) === yearStr);
  const totalIncome = yearIncome.reduce((s, d) => s + Number(d.Amount || 0), 0);
  const totalExpenses = yearExpenses.reduce((s, e) => s + Number(e.Amount || 0), 0);
  const totalAuction = yearAuction
    .filter((a) => a.Status === "Confirmed")
    .reduce((s, a) => s + Number(a.BidAmount || 0), 0);
  const balance = totalIncome + totalAuction - totalExpenses;

  const canEdit = role === "Admin" || role === "Editor";
  const isAdmin = role === "Admin";

  // ============================================================
  // RENDER
  // ============================================================

  if (loading) return <LangContext.Provider value={lang}><LoadingScreen /></LangContext.Provider>;
  if (!user) return <LangContext.Provider value={lang}><LoginScreen lang={lang} setLang={setLang} /></LangContext.Provider>;
  if (!role) return <LangContext.Provider value={lang}><NoAccessScreen email={user.email} onLogout={logout} error={error} /></LangContext.Provider>;

  return (
    <LangContext.Provider value={lang}>
    <div style={styles.app}>
      {/* Header */}
      <header style={styles.header}>
        <div style={styles.headerInner}>
          <div style={styles.headerLeft}>
            <div style={styles.logo}>🪔</div>
            <div>
              <h1 style={styles.headerTitle}>{t("appTitle", lang)}</h1>
              <p style={styles.headerSubtitle}>
                <select
                  value={currentYear}
                  onChange={(e) => setCurrentYear(Number(e.target.value))}
                  style={{ background: "transparent", color: "inherit", border: "1px solid rgba(255,255,255,0.4)", borderRadius: 4, padding: "1px 4px", fontSize: "inherit", fontFamily: "inherit", cursor: "pointer" }}
                >
                  {Array.from({ length: 5 }, (_, i) => new Date().getFullYear() - 2 + i).map((y) => (
                    <option key={y} value={y} style={{ color: "#1a1a1a" }}>{y}</option>
                  ))}
                </select>
              </p>
            </div>
          </div>
          <div style={styles.headerRight}>
            {/* Language Toggle */}
            <button
              onClick={() => setLang(lang === "en" ? "ta" : "en")}
              style={styles.langToggle}
              title={lang === "en" ? "Switch to Tamil" : "Switch to English"}
            >
              {lang === "en" ? "தமிழ்" : "ENG"}
            </button>
            <div style={styles.userBadge}>
              <span style={styles.rolePill}>{role}</span>
              <span style={styles.userName}>{user.name?.split(" ")[0]}</span>
            </div>
            <button onClick={logout} style={styles.logoutBtn}>↗</button>
          </div>
        </div>

      </header>

      {/* Live Date/Time Bar */}
      <LiveClock lang={lang} />

      {/* Busy overlay */}
      {busy && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 9999, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ background: "#fff", borderRadius: 12, padding: "24px 32px", textAlign: "center", boxShadow: "0 4px 24px rgba(0,0,0,0.2)" }}>
            <div style={{ fontSize: 28, marginBottom: 8 }}>⏳</div>
            <div style={{ fontWeight: 600, color: "#292524" }}>Processing...</div>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast && (
        <div style={{
          ...styles.toast,
          background: toast.type === "error" ? "#dc2626" : toast.type === "info" ? "#2563eb" : "#059669",
        }}>
          {toast.msg}
        </div>
      )}

      {/* Main Content */}
      <main style={styles.main}>
        {/* Event Setup Banner - show if no Day1 for current year */}
        {!day1Date && (
          <EventSetupBanner
            currentYear={currentYear}
            isAdmin={isAdmin}
            onSave={saveEventConfig}
            onSeedAuction={seedAuctionItems}
            lang={lang}
          />
        )}
        {activeTab === "dashboard" && (
          <Dashboard
            totalIncome={totalIncome}
            totalExpenses={totalExpenses}
            totalAuction={totalAuction}
            balance={balance}
            income={yearIncome}
            expenses={yearExpenses}
            auction={yearAuction}
            families={families}
          />
        )}
        {activeTab === "income" && (() => {
          const specialCats = ["Pulli Vari", "Pen Pulli Varavu", "Cash Donation", "Material Donation"];
          const isSpecial = (cat) => specialCats.some((s) => String(cat || "").trim().toLowerCase() === s.toLowerCase());
          const subTabs = [
            { id: "general", label: t("generalIncome", lang), icon: "💰" },
            { id: "pulli", label: t("pulliVari", lang), icon: "👨", cat: "Pulli Vari" },
            { id: "penpulli", label: t("penPulli", lang), icon: "👩", cat: "Pen Pulli Varavu" },
            { id: "cashdon", label: t("nankodaiPanam", lang), icon: "💵", cat: "Cash Donation" },
            { id: "matdon", label: t("nankodaiPorutkkal", lang), icon: "📦", cat: "Material Donation" },
          ];
          const activeSub = subTabs.find((s) => s.id === incomeSubTab) || subTabs[0];
          const filteredIncome = activeSub.cat
            ? yearIncome.filter((d) => String(d.Category || "").trim().toLowerCase() === activeSub.cat.toLowerCase())
            : yearIncome.filter((d) => !isSpecial(d.Category));
          const filteredCats = activeSub.cat ? [activeSub.cat] : INCOME_CATS.filter((c) => !isSpecial(c));
          const pulliDefault = Number((master["Pulli Vari Default"] || [])[0]) || 51;
          const penPulliDefault = Number((master["Pen Pulli Vari Default"] || [])[0]) || 2;
          return (
            <div>
              {/* Sub-tab bar */}
              <div style={{ display: "flex", gap: 4, padding: "8px 12px", overflowX: "auto", background: "#fafaf9", borderBottom: "1px solid #e7e5e4" }}>
                {subTabs.map((st) => (
                  <button key={st.id} onClick={() => setIncomeSubTab(st.id)} style={{
                    padding: "6px 10px", borderRadius: 8, fontSize: 11, fontWeight: 600, cursor: "pointer",
                    border: "none", whiteSpace: "nowrap", transition: "all 0.2s",
                    background: incomeSubTab === st.id ? "#292524" : "#fff",
                    color: incomeSubTab === st.id ? "#fff" : "#57534e",
                    boxShadow: incomeSubTab === st.id ? "0 2px 4px rgba(0,0,0,0.15)" : "0 1px 2px rgba(0,0,0,0.05)",
                  }}>
                    {st.icon} {st.label}
                  </button>
                ))}
              </div>
              {/* Pulli Vari - family checklist view */}
              {incomeSubTab === "pulli" ? (
                <PulliVariView
                  families={families}
                  income={yearIncome}
                  category={activeSub.cat}
                  defaultAmount={pulliDefault}
                  title={t("pulliVariFull", lang)}
                  onAdd={addIncome}
                  onDelete={deleteIncome}
                  isAdmin={isAdmin}
                  canEdit={canEdit}
                  day1Date={day1Date}
                  currentYear={currentYear}
                />
              ) : (
                <IncomeView
                  income={filteredIncome}
                  families={families}
                  canEdit={canEdit}
                  isAdmin={isAdmin}
                  onAdd={() => setShowForm(activeSub.cat ? "income_" + incomeSubTab : "income")}
                  onEdit={editIncome}
                  onDelete={deleteIncome}
                  showToast={showToast}
                  lang={lang}
                  categories={filteredCats}
                  donorTypes={activeSub.cat ? ["Family", "External"] : DONOR_TYPES}
                  day1Date={day1Date}
                  subTabTitle={activeSub.cat ? t(activeSub.id === "penpulli" ? "penPulliFull" : activeSub.id === "cashdon" ? "nankodaiPanamFull" : activeSub.id === "matdon" ? "nankodaiPorutkkalFull" : "generalIncome", lang) : null}
                  fixedCategory={activeSub.cat || null}
                />
              )}
            </div>
          );
        })()}
        {activeTab === "expenses" && (
          <ExpensesView
            expenses={yearExpenses}
            canEdit={canEdit}
            isAdmin={isAdmin}
            onAdd={() => setShowForm("expense")}
            onEdit={editExpense}
            onDelete={deleteExpense}
            showToast={showToast}
            lang={lang}
            categories={EXPENSE_CATS}
            day1Date={day1Date}
          />
        )}
        {activeTab === "auction" && (
          <AuctionView
            auction={yearAuction}
            families={families}
            canEdit={canEdit}
            isAdmin={isAdmin}
            email={user.email}
            onBid={enterAuctionBid}
            onAddItem={() => setShowForm("auctionItem")}
            showToast={showToast}
            lang={lang}
            backend={backendRef.current}
            donorTypes={DONOR_TYPES}
          />
        )}
        {activeTab === "families" && (
          <FamiliesView
            families={families}
            isAdmin={isAdmin}
            canEdit={canEdit}
            onAdd={() => setShowForm("family")}
            showToast={showToast}
            lang={lang}
          />
        )}
        {activeTab === "loans" && (
          <LoansView
            loans={yearLoans}
            allLoans={loans}
            families={families}
            currentYear={currentYear}
            isAdmin={isAdmin}
            onAdd={addLoan}
            onReceive={receiveLoan}
            onEdit={editLoan}
            onDelete={deleteLoan}
            showToast={showToast}
            day1Date={day1Date}
          />
        )}
        {activeTab === "reports" && (
          <ReportsView
            families={families}
            income={yearIncome}
            expenses={yearExpenses}
            auction={yearAuction}
            loans={loans}
            totalIncome={totalIncome}
            totalExpenses={totalExpenses}
            totalAuction={totalAuction}
            balance={balance}
            ledger={ledger}
            currentYear={currentYear}
            showToast={showToast}
            lang={lang}
          />
        )}
        {activeTab === "auditlog" && isAdmin && (
          <AuditLogView entries={auditLog} />
        )}
      </main>

      {/* Forms (Modal) */}
      {showForm === "income" && (() => {
        const specialCatsForm = ["Pulli Vari", "Pen Pulli Varavu", "Cash Donation", "Material Donation"];
        const isSpecialForm = (c) => specialCatsForm.some((s) => String(c || "").trim().toLowerCase() === s.toLowerCase());
        const generalCats = INCOME_CATS.filter((c) => !isSpecialForm(c));
        return (
          <IncomeForm
            families={families}
            onSubmit={addIncome}
            onClose={() => setShowForm(null)}
            categories={generalCats}
            donorTypes={DONOR_TYPES}
            day1Date={day1Date}
          />
        );
      })()}
      {showForm && showForm.startsWith("income_") && (
        <IncomeForm
          families={families}
          onSubmit={addIncome}
          onClose={() => setShowForm(null)}
          categories={INCOME_CATS}
          donorTypes={DONOR_TYPES}
          day1Date={day1Date}
          fixedCategory={
            showForm === "income_pulli" ? "Pulli Vari" :
            showForm === "income_penpulli" ? "Pen Pulli Varavu" :
            showForm === "income_cashdon" ? "Cash Donation" :
            showForm === "income_matdon" ? "Material Donation" : null
          }
        />
      )}
      {showForm === "expense" && (
        <ExpenseForm
          onSubmit={addExpense}
          onClose={() => setShowForm(null)}
          categories={EXPENSE_CATS}
          day1Date={day1Date}
        />
      )}
      {showForm === "family" && (
        <FamilyForm
          onSubmit={addFamily}
          onClose={() => setShowForm(null)}
        />
      )}
      {showForm === "auctionItem" && (
        <AuctionItemForm
          onSubmit={addAuctionItem}
          onClose={() => setShowForm(null)}
          currentYear={currentYear}
        />
      )}

      {/* Bottom Nav */}
      <nav style={styles.nav}>
        {[
          { id: "dashboard", icon: "📊", label: t("navHome", lang) },
          { id: "income", icon: "💰", label: t("navDonate", lang) },
          { id: "expenses", icon: "💸", label: t("navExpense", lang) },
          { id: "auction", icon: "🔨", label: t("navAuction", lang) },
          { id: "loans", icon: "🏦", label: t("navLoans", lang) },
        ].map((tab) => (
          <button
            key={tab.id}
            onClick={() => { setActiveTab(tab.id); setShowMoreMenu(false); }}
            style={{
              ...styles.navBtn,
              color: activeTab === tab.id ? "#b45309" : "#78716c",
              borderTop: activeTab === tab.id ? "3px solid #b45309" : "3px solid transparent",
            }}
          >
            <span style={{ fontSize: 20 }}>{tab.icon}</span>
            <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: 0.5 }}>{tab.label}</span>
          </button>
        ))}
        {/* More button */}
        <div style={{ position: "relative" }}>
          <button
            onClick={() => setShowMoreMenu(!showMoreMenu)}
            style={{
              ...styles.navBtn,
              color: ["families", "reports", "auditlog"].includes(activeTab) ? "#b45309" : "#78716c",
              borderTop: ["families", "reports", "auditlog"].includes(activeTab) ? "3px solid #b45309" : "3px solid transparent",
            }}
          >
            <span style={{ fontSize: 20 }}>⋯</span>
            <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: 0.5 }}>{t("navMore", lang)}</span>
          </button>
          {showMoreMenu && (
            <>
            <div onClick={() => setShowMoreMenu(false)} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: 199 }} />
            <div style={{
              position: "absolute", bottom: "100%", right: 0, background: "#fff",
              borderRadius: 12, boxShadow: "0 -4px 20px rgba(0,0,0,0.15)", border: "1px solid #e7e5e4",
              padding: 8, minWidth: 160, zIndex: 200,
            }}>
              {[
                { id: "families", icon: "👨‍👩‍👧‍👦", label: t("navFamily", lang) },
                { id: "reports", icon: "📋", label: t("navReports", lang) },
                ...(isAdmin ? [{ id: "auditlog", icon: "📜", label: t("navAuditLog", lang) }] : []),
              ].map((tab) => (
                <button
                  key={tab.id}
                  onClick={() => { setActiveTab(tab.id); setShowMoreMenu(false); }}
                  style={{
                    display: "flex", alignItems: "center", gap: 10, width: "100%",
                    padding: "10px 12px", border: "none", borderRadius: 8, cursor: "pointer",
                    background: activeTab === tab.id ? "#fef3c7" : "transparent",
                    color: activeTab === tab.id ? "#b45309" : "#292524",
                    fontSize: 14, fontWeight: 600, textAlign: "left",
                  }}
                >
                  <span style={{ fontSize: 18 }}>{tab.icon}</span> {tab.label}
                </button>
              ))}
            </div>
            </>
          )}
        </div>
      </nav>

    </div>
    </LangContext.Provider>
  );
}

function LoadingScreen() {
  const lang = useLang();
  return (
    <div style={styles.centerScreen}>
      <div style={styles.spinner} />
      <p style={{ color: "#78716c", marginTop: 16, fontFamily: "'Cormorant Garamond', serif" }}>
        {t("loading", lang)}
      </p>
    </div>
  );
}

function LiveClock({ lang }) {
  const [time, setTime] = useState(new Date());
  useEffect(() => {
    const id = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const opts = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
  const dateStr = time.toLocaleDateString(lang === 'ta' ? 'ta-IN' : 'en-IN', opts);
  const timeStr = time.toLocaleTimeString(lang === 'ta' ? 'ta-IN' : 'en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  return (
    <div style={{ background: '#fefce8', borderBottom: '1px solid #fde68a', padding: '6px 16px', display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 12, fontSize: 13, color: '#92400e', fontWeight: 500 }}>
      <span>📅 {dateStr}</span>
      <span>🕐 {timeStr}</span>
    </div>
  );
}

function LoginScreen({ lang, setLang }) {
  useEffect(() => {
    let rendered = false;
    let interval;
    const tryRender = () => {
      if (rendered) return;
      const el = document.getElementById("g-signin-btn");
      if (el && window.google && window.google.accounts) {
        el.innerHTML = "";
        window.google.accounts.id.renderButton(el, {
          theme: "outline",
          size: "large",
          width: 300,
          text: "signin_with",
          shape: "rectangular",
        });
        rendered = true;
        if (interval) clearInterval(interval);
      }
    };
    tryRender();
    interval = setInterval(tryRender, 500);
    setTimeout(() => clearInterval(interval), 10000);
    return () => clearInterval(interval);
  }, []);
  return (
    <div style={styles.loginScreen}>
      <div style={styles.loginCard}>
        {/* Language toggle on login */}
        <button
          onClick={() => setLang(lang === "en" ? "ta" : "en")}
          style={{ ...styles.langToggle, position: "absolute", top: 16, right: 16, background: "#292524", color: "#fff" }}
        >
          {lang === "en" ? "தமிழ்" : "ENG"}
        </button>
        <div style={{ fontSize: 64, marginBottom: 8 }}>🪔</div>
        <h1 style={styles.loginTitle}>Nagammal PPP Sangam</h1>
        <div style={styles.loginDivider} />
        <div style={{ marginTop: 24 }}>
            <div id="g-signin-btn" style={{ display: "flex", justifyContent: "center", minHeight: 44 }} />
          </div>
        <p style={styles.loginFooter}>
          {t("loginFooter", lang)}
        </p>
      </div>
    </div>
  );
}

function NoAccessScreen({ email, onLogout, error }) {
  const lang = useLang();
  const [debugInfo, setDebugInfo] = useState(null);
  const runDebug = async () => {
    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "debugAccess", email: email }),
      });
      const data = await res.json();
      setDebugInfo(JSON.stringify(data, null, 2));
    } catch (e) {
      setDebugInfo("Debug failed: " + e.message);
    }
  };
  return (
    <div style={styles.centerScreen}>
      <div style={{ textAlign: "center", padding: 32 }}>
        <div style={{ fontSize: 48 }}>🔒</div>
        <h2 style={{ fontFamily: "'Cormorant Garamond', serif", color: "#292524", marginTop: 16 }}>
          {t("accessPending", lang)}
        </h2>
        <p style={{ color: "#78716c", marginTop: 8, maxWidth: 300 }}>
          <strong>{email}</strong> {t("noAccess", lang)}
        </p>
        {error && <p style={{ color: "#dc2626", marginTop: 8, fontSize: 13 }}>{error}</p>}
        <button onClick={onLogout} style={{ ...styles.btnPrimary, marginTop: 24 }}>
          {t("signOut", lang)}
        </button>
        <button onClick={runDebug} style={{ ...styles.btnSecondary, marginTop: 12, fontSize: 12 }}>
          🔍 Debug Access
        </button>

// ============================================================
// PULLI VARI VIEW — Family checklist with auto-fill amounts
// ============================================================
function PulliVariView({ families, income, category, defaultAmount, title, onAdd, onDelete, isAdmin, canEdit, day1Date, currentYear }) {
  const lang = useLang();
  const fmt = (v) => "₹" + Number(v || 0).toLocaleString("en-IN");
  const [busy, setBusy] = useState(null); // familyId being processed

  // Find which families have paid (income entries with this category)
  const paidByFamily = {};
  (income || []).forEach((d) => {
    if (d.Category === category) {
      const fid = String(d.FamilyID || "").trim();
      if (fid) {
        if (!paidByFamily[fid]) paidByFamily[fid] = { amount: 0, txnId: d.TxnID };
        paidByFamily[fid].amount += Number(d.Amount) || 0;
        paidByFamily[fid].txnId = d.TxnID; // last one
      }
    }
  });

  // Build rows sorted by FamilyID
  const rows = (families || []).map((f) => {
    const fid = String(f.FamilyID || "").trim();
    const paid = paidByFamily[fid];
    return { id: fid, name: f.FamilyName, paid: !!paid, amount: paid ? paid.amount : 0, txnId: paid ? paid.txnId : null };
  }).sort((a, b) => {
    const numA = parseInt(String(a.id).replace(/\D/g, "")) || 0;
    const numB = parseInt(String(b.id).replace(/\D/g, "")) || 0;
    return numA - numB;
  });

  const paidCount = rows.filter((r) => r.paid).length;
  const totalCollected = rows.reduce((s, r) => s + r.amount, 0);

  // Quick-pay: create income entry for a family
  const quickPay = async (fam) => {
    if (busy) return;
    setBusy(fam.id);
    // Use day1Date as default date for the entry
    const dateToUse = day1Date || todayISO();
    const autoDay = calcDay(dateToUse, day1Date) || "1";
    await onAdd({
      date: dateToUse,
      day: autoDay,
      year: String(currentYear),
      donorType: "Family",
      familyId: fam.id,
      donorName: fam.name,
      category: category,
      amount: String(defaultAmount),
      description: "",
    });
    setBusy(null);
  };

  // Quick-unpay: delete the income entry
  const quickUnpay = async (fam) => {
    if (busy || !fam.txnId) return;
    setBusy(fam.id);
    await onDelete(fam.txnId);
    setBusy(null);
  };

  return (
    <div style={styles.page}>
      <div style={styles.pageHeader}>
        <h2 style={styles.pageTitle}>{title}</h2>
      </div>

      {/* Summary */}
      <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
        <div style={{ flex: 1, background: "#f0fdf4", borderRadius: 10, padding: "10px 12px", textAlign: "center" }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#166534" }}>{paidCount}</div>
          <div style={{ fontSize: 11, color: "#15803d" }}>✅ {lang === "ta" ? "செலுத்தியது" : "Paid"}</div>
        </div>
        <div style={{ flex: 1, background: "#fef2f2", borderRadius: 10, padding: "10px 12px", textAlign: "center" }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#991b1b" }}>{rows.length - paidCount}</div>
          <div style={{ fontSize: 11, color: "#dc2626" }}>❌ {lang === "ta" ? "செலுத்தவில்லை" : "Not Paid"}</div>
        </div>
        <div style={{ flex: 1, background: "#fef3c7", borderRadius: 10, padding: "10px 12px", textAlign: "center" }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#92400e" }}>{fmt(totalCollected)}</div>
          <div style={{ fontSize: 11, color: "#78716c" }}>{lang === "ta" ? "வசூல்" : "Collected"}</div>
        </div>
      </div>

      <div style={{ fontSize: 12, color: "#78716c", marginBottom: 8 }}>
        {lang === "ta" ? "இயல்பு தொகை" : "Default amount"}: <strong>{fmt(defaultAmount)}</strong> {lang === "ta" ? "/ குடும்பம்" : "/ family"}
      </div>

      {/* Family list */}
      {rows.map((r) => (
        <div key={r.id} style={{
          display: "flex", justifyContent: "space-between", alignItems: "center",
          background: r.paid ? "#f0fdf4" : "#fff", borderRadius: 10, padding: "10px 14px",
          marginBottom: 6, border: "1px solid " + (r.paid ? "#bbf7d0" : "#e7e5e4"),
        }}>
          <div>
            <div style={{ fontWeight: 600, fontSize: 14 }}>{r.name}</div>
            <div style={{ fontSize: 11, color: "#a8a29e" }}>{r.id}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {r.paid && <span style={{ fontSize: 13, fontWeight: 600, color: "#16a34a" }}>{fmt(r.amount)}</span>}
            {canEdit && !r.paid && (
              <button
                onClick={() => quickPay(r)}
                disabled={!!busy}
                style={{
                  background: "#16a34a", color: "#fff", border: "none", borderRadius: 8,
                  padding: "6px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer",
                  opacity: busy === r.id ? 0.5 : 1,
                }}
              >
                {busy === r.id ? "⏳" : "✅"} {fmt(defaultAmount)}
              </button>
            )}
            {r.paid && (
              <span style={{ fontSize: 18, color: "#16a34a" }}>✅</span>
            )}
            {isAdmin && r.paid && (
              <button
                onClick={() => quickUnpay(r)}
                disabled={!!busy}
                style={{
                  background: "none", border: "1px solid #fecaca", borderRadius: 6,
                  padding: "3px 8px", fontSize: 11, cursor: "pointer", color: "#dc2626",
                  opacity: busy === r.id ? 0.5 : 1,
                }}
              >
                ↩
              </button>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

function AuctionView({ auction, families, canEdit, isAdmin, email, onBid, onAddItem, showToast, lang: propLang, backend, donorTypes }) {
  const lang = useLang();
  const [selectedItem, setSelectedItem] = useState(null);

  const [filterStatus, setFilterStatus] = useState("All");
  const [photoViewer, setPhotoViewer] = useState(null); // { itemNo, photoUrl }
  const [uploadingPhoto, setUploadingPhoto] = useState(null); // itemNo being uploaded
  const fileInputRef = useRef(null);

  const filtered = filterStatus === "All"
    ? auction
    : filterStatus === "Unsold"
      ? auction.filter((a) => !a.Status)
      : auction.filter((a) => a.Status === filterStatus);

  const handleSubmitBid = (index) => {
    if (!bidForm.amount || !bidForm.winnerName) return;
    onBid(index, bidForm);
    setSelectedItem(null);
    setBidForm({ bidderType: "Family", familyId: "", winnerName: "", amount: "" });
  };

  const handlePhotoUpload = async (itemNo) => {
    if (!fileInputRef.current) return;
    fileInputRef.current.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        setUploadingPhoto(itemNo);
        const base64 = await compressImage(file, 600, 0.5);
        if (backend) {
          await backend.post("uploadAuctionPhoto", { itemNo, photo: base64 });
        }
        // Update local state
        const idx = auction.findIndex((a) => String(a.ItemNo) === String(itemNo));
        if (idx >= 0) auction[idx].Photo = base64;
        if (showToast) showToast("📷 Photo uploaded!", "success");
      } catch (err) {
        console.error("Photo upload failed:", err);
        if (showToast) showToast("Photo upload failed", "error");
      } finally {
        setUploadingPhoto(null);
        fileInputRef.current.value = "";
      }
    };
    fileInputRef.current.click();
  };

  const statusLabels = { All: t("filterAll", lang), Unsold: t("filterUnsold", lang), Pending: t("filterPending", lang), Confirmed: t("filterConfirmed", lang) };

  return (
    <div style={styles.page}>
      {/* Hidden file input for photo upload */}
      <input type="file" ref={fileInputRef} accept="image/*" capture="environment" style={{ display: "none" }} />

      <div style={styles.pageHeader}>

        <div style={{ display: "flex", gap: 8 }}>
          {isAdmin && (
            <button onClick={onAddItem} style={styles.addBtn}>{t("addItem", lang)}</button>
          )}
        </div>
      </div>

      <div style={styles.filterRow}>
        {["All", "Unsold", "Pending", "Confirmed"].map((s) => (
          <button
            key={s}
            onClick={() => setFilterStatus(s)}
            style={{
              ...styles.filterPill,
              background: filterStatus === s ? "#292524" : "#f5f5f4",
              color: filterStatus === s ? "#fff" : "#57534e",
            }}
          >
            {statusLabels[s]}
          </button>
        ))}
      </div>

      <div style={styles.auctionInfo}>
        <span>🔐 Dual-entry required: Two different people must enter/confirm each bid.</span>
      </div>

      <div style={styles.txnList}>
        {filtered.map((item, i) => {
          const realIndex = auction.indexOf(item);
          const isPending = item.Status === "Pending";

            <div key={i} style={{
              ...styles.auctionCard,
              borderLeft: `4px solid ${isConfirmed ? "#059669" : isPending ? "#f59e0b" : "#d6d3d1"}`,
            }}>
              <div style={styles.txnTop}>
                <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                  {/* Photo thumbnail */}
                  {item.Photo ? (
                    <div onClick={() => setPhotoViewer({ itemNo: item.ItemNo, photoUrl: item.Photo })} style={{ cursor: "pointer", flexShrink: 0 }}>
                      <img src={item.Photo} alt={item.ItemDescription} style={{ width: 48, height: 48, borderRadius: 8, objectFit: "cover", border: "1px solid #e7e5e4" }} />
                    </div>
                  ) : canEdit ? (
                    <button onClick={() => handlePhotoUpload(item.ItemNo)} disabled={uploadingPhoto === item.ItemNo} style={{ width: 48, height: 48, borderRadius: 8, border: "2px dashed #d6d3d1", background: "#fafaf9", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, color: "#a8a29e", cursor: "pointer", flexShrink: 0 }}>
                      {uploadingPhoto === item.ItemNo ? "⏳" : "📷"}
                    </button>
                  ) : null}
                  <div>
                    <p style={styles.auctionItemNo}>#{item.ItemNo}</p>
                    <p style={styles.txnName}>{item.ItemDescription}</p>
                    {item.DonatedBy && <p style={styles.txnMeta}>{t("donatedBy", lang)}: {item.DonatedBy}</p>}
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  {item.BidAmount ? (
                    <p style={{ ...styles.txnAmount, color: "#059669" }}>{formatCurrency(item.BidAmount)}</p>
                  ) : (
                    <span style={styles.unsoldBadge}>Unsold</span>
                  )}
                  {item.Status && (
                    <span style={{
                      ...styles.statusBadge,
                      background: isConfirmed ? "#d1fae5" : "#fef3c7",
                      color: isConfirmed ? "#065f46" : "#92400e",
                    }}>
                      {item.Status}
                    </span>
                  )}
                </div>
              </div>

              {isPending && (
                <p style={styles.txnMeta}>
                  {t("enteredBy", lang)}: {item.EnteredBy1} · {item.WinnerName}
                  {item.WinnerFamilyID ? ` (${item.WinnerFamilyID})` : ` (${t("external", lang)})`}
                </p>
              )}
              {isConfirmed && (
                <p style={styles.txnMeta}>
                  {t("winner", lang)}: {item.WinnerName}
                  {item.WinnerFamilyID ? ` (${item.WinnerFamilyID})` : ` (${t("external", lang)})`} · ✓ {t("filterConfirmed", lang)}
                </p>
              )}

              {/* Action buttons */}
              {canEdit && isUnsold && (
                <button
                  onClick={() => { setSelectedItem(realIndex); setBidForm({ bidderType: "Family", familyId: "", winnerName: "", amount: "" }); }}
                  style={styles.bidBtn}
                >
                  Enter Bid
                </button>
              )}
              {canConfirm && (
                <button
                  onClick={() => onBid(realIndex, {
                    familyId: item.WinnerFamilyID,
                    winnerName: item.WinnerName,
                    amount: item.BidAmount,
                  })}
                  style={{ ...styles.bidBtn, background: "#059669" }}
                >
                  {t("confirmBid", lang)}
                </button>
              )}
              {isPending && item.EnteredBy1 === email && (
                <p style={{ ...styles.txnMeta, color: "#b45309", fontStyle: "italic" }}>
                  {t("waitingConfirm", lang)}
                </p>
              )}

              {/* Bid entry form (inline) */}
              {selectedItem === realIndex && (
                <div style={styles.inlineBidForm}>
                  {/* Bidder type toggle */}
                  <div style={{ display: "flex", gap: 6 }}>
                    {(donorTypes || ["Family", "External"]).map((tp) => (
                      <button
                        key={tp}
                        onClick={() => setBidForm({ ...bidForm, bidderType: tp, familyId: "", winnerName: "" })}
                        style={{
                          ...styles.filterPill,
                          flex: 1,
                          textAlign: "center",
                          background: bidForm.bidderType === tp ? "#292524" : "#f5f5f4",
                          color: bidForm.bidderType === tp ? "#fff" : "#57534e",
                          padding: "8px 12px",
                          fontSize: 12,
                        }}
                      >
                        {tp === "Family" ? t("bidFamily", lang) : t("bidExternal", lang)}
                      </button>
                    ))}
                  </div>

                  {/* Family selector (only for Family type) */}
                  {bidForm.bidderType === "Family" && (
                    <select
                      value={bidForm.familyId}
                      onChange={(e) => {
                        const fam = families.find((f) => f.FamilyID === e.target.value);
                        setBidForm({ ...bidForm, familyId: e.target.value, winnerName: fam?.FamilyName || "" });
                      }}
                      style={styles.input}
                    >
                      <option value="">{t("selectFamily", lang)}</option>
                      {families.map((f) => (
                        <option key={f.FamilyID} value={f.FamilyID}>
                          {f.FamilyName} ({f.FamilyID})
                        </option>
                      ))}
                    </select>
                  )}

                  <input
                    placeholder={bidForm.bidderType === "Family" ? t("winnerName", lang) : t("externalBidder", lang)}
                    value={bidForm.winnerName}
                    onChange={(e) => setBidForm({ ...bidForm, winnerName: e.target.value })}
                    style={styles.input}
                  />
                  <input
                    type="number"
                    placeholder={t("bidAmount", lang)}
                    value={bidForm.amount}
                    onChange={(e) => setBidForm({ ...bidForm, amount: e.target.value })}
                    style={styles.input}
                  />
                  <div style={{ display: "flex", gap: 8 }}>
                    <button
                      onClick={() => handleSubmitBid(realIndex)}
                      style={styles.btnPrimary}
                    >
                      {t("submitBid", lang)}
                    </button>
                    <button
                      onClick={() => setSelectedItem(null)}
                      style={styles.btnSecondary}
                    >
                      {t("cancel", lang)}
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Photo Viewer Modal */}
      {photoViewer && (
        <div onClick={() => setPhotoViewer(null)} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.85)", zIndex: 1001, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div onClick={(e) => e.stopPropagation()} style={{ maxWidth: 500, width: "100%", background: "#fff", borderRadius: 16, overflow: "hidden" }}>
            <img src={photoViewer.photoUrl} alt={"Item #" + photoViewer.itemNo} style={{ width: "100%", maxHeight: "70vh", objectFit: "contain" }} />
            <div style={{ padding: 12, textAlign: "center" }}>
              <button onClick={() => setPhotoViewer(null)} style={{ background: "#292524", color: "#fff", border: "none", borderRadius: 8, padding: "8px 24px", fontSize: 14, cursor: "pointer" }}>
                {t("cancel", lang)}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// DAY BADGE (read-only, auto-calculated from date)

function DayBadge({ day, lang }) {
  if (!day) {
    return (
      <div style={{
        background: "#dc2626",
        color: "#fff",
        borderRadius: 8,
        padding: "8px 12px",
        fontWeight: 700,
        fontSize: 12,
        textAlign: "center",
        minWidth: 60,
        marginBottom: 2,
        whiteSpace: "nowrap",
      }}>
        ✕ {t("invalidEventDate", lang)}
      </div>
    );
  }
  const colors = { "1": "#16a34a", "2": "#2563eb", "3": "#9333ea" };
  const label = day === "1" ? t("day1", lang) : day === "2" ? t("day2", lang) : t("day3", lang);
  return (
    <div style={{
      background: colors[day] || "#78716c",
      color: "#fff",
      borderRadius: 8,
      padding: "8px 16px",
      fontWeight: 700,
      fontSize: 14,
      textAlign: "center",
      minWidth: 60,
      marginBottom: 2,
      whiteSpace: "nowrap",
    }}>
      {label}
    </div>
  );
}

            setShowSetup(false);
          }}
          style={{ flex: 1, background: "#16a34a", color: "#fff", border: "none", borderRadius: 8, padding: "10px 0", fontWeight: 600, fontSize: 14, cursor: "pointer", opacity: (!day1 || saving) ? 0.5 : 1 }}

          onClick={() => setShowSetup(false)}

}

// --- Address Report ---
function AddressReport({ families }) {
  const lang = useLang();

  const downloadPDF = () => {
    const printWin = window.open("", "_blank");
    if (!printWin) return;
    const rows = families.map((f, i) =>
      `<tr style="background:${i % 2 === 0 ? '#fff' : '#f5f5f4'}">
        <td style="padding:6px 8px;border:1px solid #ccc;text-align:center;color:#999">${i + 1}</td>
        <td style="padding:6px 8px;border:1px solid #ccc"><strong>${f.FamilyName}</strong><br/><span style="font-size:11px;color:#666">${f.Address || ''}</span></td>
        <td style="padding:6px 8px;border:1px solid #ccc">${f.Phone || '—'}</td>
        <td style="padding:6px 8px;border:1px solid #ccc">${f.WhatsApp || '—'}</td>
      </tr>`
    ).join("");
    const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Address Book</title>
      <style>body{font-family:Arial,sans-serif;margin:20px}table{border-collapse:collapse;width:100%}
      @media print{body{margin:10px}button{display:none!important}}</style></head><body>
      <div style="text-align:center;margin-bottom:16px">
        <h2 style="margin:0;color:#1B5E20">Nagammal PPP Sangam</h2>
        <h3 style="margin:4px 0 0;color:#333">Family Address Directory</h3>
        <p style="color:#999;font-size:12px">${families.length} families</p>
      </div>
      <table>
        <thead>
          <tr style="background:#1B5E20;color:#fff">
            <th style="padding:8px 6px;border:1px solid #999;width:40px">Sl</th>
            <th style="padding:8px 6px;border:1px solid #999;text-align:left">Name / Address</th>
            <th style="padding:8px 6px;border:1px solid #999">Phone</th>
            <th style="padding:8px 6px;border:1px solid #999">WhatsApp</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
      <button onclick="window.print()" style="margin-top:16px;padding:10px 24px;background:#1B5E20;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer">🖨️ Print / Save as PDF</button>
      </body></html>`;
    printWin.document.write(html);
    printWin.document.close();
  };

  return (
    <div>
      <div style={styles.reportHeader}>
        <h3 style={styles.reportTitle}>{t("familyAddressDir", lang)}</h3>
        <div>
          <button onClick={downloadPDF} style={{ padding: "6px 16px", background: "#1B5E20", color: "#fff", border: "none", borderRadius: 6, fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
            📄 PDF
          </button>
        </div>
      </div>
      <p style={styles.reportSubtitle}>{families.length} {t("families", lang).toLowerCase()}</p>

      {/* Table */}
      <div style={styles.tableWrapper}>
        <table style={styles.table}>
          <thead>

// --- Auction Balance Sheet ---
function AuctionBalanceSheet({ auction, families, income, expenses, totalIncome, totalExpenses, totalAuction, balance }) {
  const lang = useLang();
  const confirmedItems = auction.filter((a) => a.Status === "Confirmed");
  const pendingItems = auction.filter((a) => a.Status === "Pending");
  const unsoldItems = auction.filter((a) => !a.Status);
  const pendingTotal = pendingItems.reduce((s, a) => s + Number(a.BidAmount || 0), 0);

  // Group auction by family / external
  const bidderTotals = {};
  confirmedItems.forEach((item) => {
    const key = item.WinnerFamilyID || `EXT-${item.WinnerName}`;
    if (!bidderTotals[key]) {
      bidderTotals[key] = {
        name: item.WinnerName,
        isExternal: !item.WinnerFamilyID,
        items: 0,
        total: 0,
      };
    }
    bidderTotals[key].items += 1;
    bidderTotals[key].total += Number(item.BidAmount || 0);
  });

  return (
    <div>
      {/* Overall Event Summary */}
      <div style={styles.reportHeader}>
        <h3 style={styles.reportTitle}>{t("eventBalanceSheet", lang)}</h3>
      </div>

      <div style={styles.balanceSheet}>
        {/* Income side */}
        <div style={styles.bsSection}>
          <div style={styles.bsSectionHeader}>
            <span style={styles.bsSectionIcon}>↓</span>
            <span style={styles.bsSectionTitle}>{t("income", lang)}</span>
          </div>
          <div style={styles.bsRow}>
            <span>{t("income", lang)}</span>
            <span style={styles.bsAmount}>{formatCurrency(totalIncome)}</span>
          </div>
          <div style={styles.bsRow}>
            <span>{t("auctionConfirmed", lang)}</span>
            <span style={styles.bsAmount}>{formatCurrency(totalAuction)}</span>
          </div>
          {pendingTotal > 0 && (
            <div style={{ ...styles.bsRow, color: "#b45309" }}>
              <span>{t("auctionPending", lang)}</span>
              <span style={styles.bsAmount}>{formatCurrency(pendingTotal)}</span>
            </div>
          )}
          <div style={styles.bsTotalRow}>
            <span>{t("totalIncome", lang)}</span>
            <span style={{ ...styles.bsAmount, fontWeight: 800 }}>
              {formatCurrency(totalIncome + totalAuction)}
            </span>
          </div>
        </div>

        {/* Expense side */}
        <div style={styles.bsSection}>
          <div style={styles.bsSectionHeader}>
            <span style={{ ...styles.bsSectionIcon, background: "#fee2e2", color: "#dc2626" }}>↑</span>
            <span style={styles.bsSectionTitle}>{t("expensesLabel", lang)}</span>
          </div>
          <div style={styles.bsRow}>
            <span>{t("totalExpenses", lang)}</span>
            <span style={styles.bsAmount}>{formatCurrency(totalExpenses)}</span>
          </div>
          <div style={styles.bsTotalRow}>
            <span>{t("totalOutflow", lang)}</span>
            <span style={{ ...styles.bsAmount, fontWeight: 800 }}>
              {formatCurrency(totalExpenses)}
            </span>
          </div>
        </div>

        {/* Net */}
        <div style={{
          ...styles.bsNetRow,
          background: balance >= 0
            ? "linear-gradient(135deg, #065f46, #059669)"
            : "linear-gradient(135deg, #991b1b, #dc2626)",
        }}>
          <span>{t("netBalanceLabel", lang)}</span>
          <span style={{ fontSize: 20, fontWeight: 800 }}>{formatCurrency(balance)}</span>
        </div>
      </div>

      {/* Auction Status Summary */}
      <div style={styles.reportHeader}>
        <h3 style={{...styles.reportTitle, marginTop: 24}}>{t("auctionSummary", lang)}</h3>
      </div>

      <div style={styles.auctionSummaryGrid}>
        <div style={{ ...styles.auctionSummaryCard, borderLeft: "4px solid #059669" }}>
          <p style={styles.asStat}>{confirmedItems.length}</p>
          <p style={styles.asLabel}>{t("confirmedLabel", lang)}</p>
          <p style={styles.asAmount}>{formatCurrency(totalAuction)}</p>

        <div style={{ ...styles.auctionSummaryCard, borderLeft: "4px solid #f59e0b" }}>

      {/* Auction Item-wise Detail */}
      {confirmedItems.length > 0 && (

      {pendingTotal > 0 && (
        <p style={{ ...styles.txnMeta, marginTop: 12, color: "#b45309", fontStyle: "italic" }}>
          {t("pendingDisclaimer", lang).replace("{amount}", formatCurrency(pendingTotal))}

  );
