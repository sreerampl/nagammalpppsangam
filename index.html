// ============================================================
// LOANS VIEW (Pangali Advances / இனத்து கணக்கு)
// ============================================================
function LoansView({ loans, allLoans, families, currentYear, isAdmin, onAdd, onReceive, onEdit, onDelete, showToast, day1Date }) {
  const lang = useLang();
  const fmt = (v) => "₹" + Number(v || 0).toLocaleString("en-IN");
  const [showAddForm, setShowAddForm] = useState(false);
  const [receiveModal, setReceiveModal] = useState(null);
  const [editModal, setEditModal] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);

  // Get last year outstanding from stored field on current year loans
  const prevYear = String(Number(currentYear) - 1);
  const prevYearOutstanding = {};
  (loans || []).forEach((l) => {
    const fid = String(l.FamilyID || "").trim();
    const lyr = Number(l.LastYearReceivable) || 0;
    if (lyr > 0) {
      if (!prevYearOutstanding[fid]) prevYearOutstanding[fid] = 0;
      prevYearOutstanding[fid] += lyr;
    }
  });

  const totalAdvanced = loans.reduce((s, l) => s + (Number(l.LoanAmount) || 0), 0);
  const totalDue = loans.reduce((s, l) => s + (Number(l.TotalReceivable) || 0), 0);
  const totalRec = loans.reduce((s, l) => s + (Number(l.ReceivedAmount) || 0), 0);
  const totalPrevOutstanding = Object.values(prevYearOutstanding).reduce((s, v) => s + v, 0);
  const pendingCount = loans.filter((l) => l.RecStatus !== "Received").length;

  const statusColor = (s) => s === "Received" ? "#16a34a" : s === "Partial" ? "#d97706" : "#dc2626";
  const statusLabel = (s) => s === "Received" ? t("loanReceived", lang) : s === "Partial" ? t("loanPartial", lang) : t("loanPending", lang);

  return (
    <div style={styles.page}>
      <div style={styles.pageHeader}>
        <h2 style={styles.pageTitle}>{t("loans", lang)}</h2>
        {isAdmin && <button onClick={() => setShowAddForm(true)} style={styles.addBtn}>+ {t("addLoan", lang)}</button>}
      </div>

      {/* Summary cards */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 8 }}>
        {totalPrevOutstanding > 0 && (
          <div style={{ background: "#fef3c7", borderRadius: 10, padding: "10px 8px", textAlign: "center", gridColumn: "1 / -1" }}>
            <div style={{ fontSize: 18, fontWeight: 700, color: "#92400e" }}>{fmt(totalPrevOutstanding)}</div>
            <div style={{ fontSize: 10, color: "#78716c" }}>{lang === "ta" ? `${prevYear} நிலுவை` : `${prevYear} Outstanding`}</div>
          </div>
        )}
        <div style={{ background: "#fef3c7", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#92400e" }}>{fmt(totalAdvanced)}</div>
          <div style={{ fontSize: 10, color: "#78716c" }}>{t("totalAdvanced", lang)}</div>
        </div>
        <div style={{ background: "#fee2e2", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#991b1b" }}>{fmt(totalDue)}</div>
          <div style={{ fontSize: 10, color: "#78716c" }}>{t("totalDue", lang)}</div>
        </div>
        <div style={{ background: "#dcfce7", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#166534" }}>{fmt(totalRec)}</div>
          <div style={{ fontSize: 10, color: "#78716c" }}>{t("totalReceived", lang)}</div>
        </div>
        <div style={{ background: "#fef9c3", borderRadius: 10, padding: "10px 8px", textAlign: "center" }}>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#854d0e" }}>{pendingCount}</div>
          <div style={{ fontSize: 10, color: "#78716c" }}>{t("pendingLoans", lang)}</div>
        </div>
      </div>

      {/* Loan list */}
      {loans.length === 0 ? (
        <div style={{ textAlign: "center", padding: 40, color: "#a8a29e" }}>{lang === "ta" ? "இந்த ஆண்டு கடன்கள் இல்லை" : "No advances for this year"}</div>
      ) : (
        loans.map((l) => (
          <div key={l.LoanID} style={{ ...styles.card, marginBottom: 10, borderLeft: `4px solid ${statusColor(l.RecStatus)}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 15 }}>{l.FamilyName} <span style={{ color: "#a8a29e", fontSize: 12 }}>({l.FamilyID})</span></div>
                {prevYearOutstanding[String(l.FamilyID || "").trim()] > 0 && (
                  <div style={{ fontSize: 12, color: "#b45309", background: "#fef3c7", borderRadius: 4, padding: "2px 6px", display: "inline-block", marginTop: 2 }}>
                    ⚠️ {prevYear} {lang === "ta" ? "நிலுவை" : "Outstanding"}: {fmt(prevYearOutstanding[String(l.FamilyID || "").trim()])}
                  </div>
                )}
                <div style={{ fontSize: 12, color: "#78716c", marginTop: 2 }}>
                  {t("loanAmount", lang)}: {fmt(l.LoanAmount)} · {t("interestRate", lang).replace(" (%)", "")}: {l.InterestRate}% · {t("interestAmount", lang)}: {fmt(l.InterestAmount)}
                </div>
                <div style={{ fontSize: 13, fontWeight: 600, marginTop: 4 }}>
                  {t("totalReceivable", lang)}: {fmt(l.TotalReceivable)} · {t("receivedAmount", lang)}: {fmt(l.ReceivedAmount)}
                </div>
                {l.Notes && <div style={{ fontSize: 11, color: "#78716c", marginTop: 2 }}>📝 {l.Notes}</div>}
              </div>
              <div style={{ textAlign: "right" }}>
                <span style={{ background: statusColor(l.RecStatus), color: "#fff", borderRadius: 6, padding: "3px 8px", fontSize: 11, fontWeight: 700 }}>
                  {statusLabel(l.RecStatus)}
                </span>
                {isAdmin && l.RecStatus !== "Received" && (
                  <div style={{ marginTop: 6 }}>
                    <button onClick={() => setReceiveModal(l)} style={{ ...styles.addBtn, fontSize: 11, padding: "4px 10px", background: "#16a34a" }}>💰 {t("receiveLoan", lang)}</button>
                  </div>
                )}
                {isAdmin && (
                  <div style={{ marginTop: 4, display: "flex", gap: 4, justifyContent: "flex-end" }}>
                    <button onClick={() => setEditModal(l)} style={{ fontSize: 11, background: "none", border: "1px solid #d6d3d1", borderRadius: 6, padding: "2px 8px", cursor: "pointer" }}>✏️</button>
                    <button onClick={() => setConfirmDelete(l)} style={{ fontSize: 11, background: "none", border: "1px solid #fecaca", borderRadius: 6, padding: "2px 8px", cursor: "pointer", color: "#dc2626" }}>🗑️</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        ))
      )}

      {/* Add Loan Modal */}
      {showAddForm && (
        <LoanAddForm
          families={families}
          allLoans={allLoans}
          currentYear={currentYear}
          day1Date={day1Date}
          onSubmit={(data) => { onAdd(data); setShowAddForm(false); }}
          onClose={() => setShowAddForm(false)}
        />
      )}

      {/* Receive Payment Modal */}
      {receiveModal && (
        <LoanReceiveForm
          loan={receiveModal}
          onSubmit={(data) => { onReceive(data); setReceiveModal(null); }}
          onClose={() => setReceiveModal(null)}
        />
      )}

      {/* Edit Loan Modal */}
      {editModal && (
        <LoanEditForm
          loan={editModal}
          families={families}
          onSubmit={(data) => { onEdit(data); setEditModal(null); }}
          onClose={() => setEditModal(null)}
        />
      )}

      {/* Delete Confirmation */}
      {confirmDelete && (
        <Modal title={lang === "ta" ? "நீக்க உறுதிப்படுத்தவும்" : "Confirm Delete"} onClose={() => setConfirmDelete(null)}>
          <p>{lang === "ta" ? "இந்த முன்பணத்தை நீக்க வேண்டுமா?" : "Delete this advance?"}</p>
          <p style={{ fontWeight: 700 }}>{confirmDelete.FamilyName} — {fmt(confirmDelete.LoanAmount)}</p>
          <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
            <button onClick={() => setConfirmDelete(null)} style={{ ...styles.btnPrimary, flex: 1, background: "#78716c" }}>{t("cancel", lang)}</button>
            <button onClick={() => { onDelete(confirmDelete.LoanID); setConfirmDelete(null); }} style={{ ...styles.btnPrimary, flex: 1, background: "#dc2626" }}>{t("delete", lang)}</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// --- Loan Add Form ---
function LoanAddForm({ families, allLoans, currentYear, onSubmit, onClose, day1Date }) {
  const lang = useLang();
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({
    familyId: "",
    familyName: "",
    lastYearReceivable: "",
    loanAmount: "",
    interestRate: "9",
    issuedDate: todayISO(),
    notes: "",
  });
  const set = (k, v) => setForm((prev) => ({ ...prev, [k]: v }));

  // Calculate previous year outstanding for a given family
  const prevYear = String(Number(currentYear) - 1);
  const calcPrevOutstanding = (familyId) => {
    let due = 0;
    (allLoans || []).forEach((l) => {
      if (String(l.Year) === prevYear && String(l.FamilyID || "").trim() === String(familyId).trim()) {
        const d = (Number(l.TotalReceivable) || 0) - (Number(l.ReceivedAmount) || 0);
        if (d > 0) due += d;
      }
    });
    return due;
  };

  // On family select, auto-fill last year receivable
  const onFamilyChange = (e) => {
    const fid = e.target.value;
    const fam = families.find((f) => f.FamilyID === fid);
    set("familyId", fid);
    if (fam) set("familyName", fam.FamilyName);
    const prevDue = calcPrevOutstanding(fid);
    set("lastYearReceivable", prevDue > 0 ? String(prevDue) : "");
  };

  const lastYrRec = Number(form.lastYearReceivable) || 0;
  const loanAmt = Number(form.loanAmount) || 0;
  const rate = Number(form.interestRate) || 0;
  const intOnLoan = Math.round(loanAmt * rate / 100);
  const intOnPrev = Math.round(lastYrRec * rate / 100);
  const intAmt = intOnLoan + intOnPrev;
  const totalRec = lastYrRec + loanAmt + intAmt;
  const autoDay = calcDay(form.issuedDate, day1Date);

  return (
    <Modal title={t("addLoan", lang)} onClose={onClose}>
      <div style={styles.formGrid}>
        <label style={styles.label}>{t("family", lang)}
          <select value={form.familyId} onChange={onFamilyChange} style={styles.input}>
            <option value="">{t("select", lang)}</option>
            {families.map((f) => (<option key={f.FamilyID} value={f.FamilyID}>{f.FamilyName} ({f.FamilyID})</option>))}
          </select>
        </label>
        <label style={styles.label}>{lang === "ta" ? "கடந்த ஆண்டு நிலுவை" : "Last Year Receivable"} (₹)
          <input type="number" value={form.lastYearReceivable} onChange={(e) => set("lastYearReceivable", e.target.value)} style={{ ...styles.input, background: "#fef3c7" }} placeholder="0" />
        </label>
        <label style={styles.label}>{t("loanAmount", lang)} (₹)
          <input type="number" value={form.loanAmount} onChange={(e) => set("loanAmount", e.target.value)} style={styles.input} placeholder="0" />
        </label>
        <div style={{ display: "flex", gap: 10 }}>
          <label style={{ ...styles.label, flex: 1 }}>{t("interestRate", lang)}
            <input type="number" value={form.interestRate} onChange={(e) => set("interestRate", e.target.value)} style={styles.input} step="0.5" />
          </label>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
          <label style={{ ...styles.label, flex: 1 }}>{t("issuedDate", lang)}
            <input type="date" value={form.issuedDate} onChange={(e) => set("issuedDate", e.target.value)} style={styles.input} />
          </label>
          <DayBadge day={autoDay} lang={lang} />
        </div>
        {/* Auto-calculated summary */}
        {(loanAmt > 0 || lastYrRec > 0) && (
          <div style={{ background: "#f5f5f4", borderRadius: 8, padding: 12, fontSize: 13 }}>
            {lastYrRec > 0 && <div style={{ color: "#b45309" }}>{lang === "ta" ? "கடந்த ஆண்டு நிலுவை" : "Last Year Receivable"}: <strong>₹{lastYrRec.toLocaleString("en-IN")}</strong> {intOnPrev > 0 && <span>(+ ₹{intOnPrev.toLocaleString("en-IN")} {lang === "ta" ? "வட்டி" : "int"})</span>}</div>}
            {loanAmt > 0 && <div>{lang === "ta" ? "புதிய கடன்" : "New Loan"}: <strong>₹{loanAmt.toLocaleString("en-IN")}</strong> {intOnLoan > 0 && <span>(+ ₹{intOnLoan.toLocaleString("en-IN")} {lang === "ta" ? "வட்டி" : "int"})</span>}</div>}
            <div style={{ fontSize: 12, color: "#78716c", marginTop: 2 }}>{t("interestAmount", lang)}: ₹{intAmt.toLocaleString("en-IN")} ({rate}%)</div>
            <div style={{ fontWeight: 700, fontSize: 15, marginTop: 4, color: "#b45309" }}>{t("totalReceivable", lang)}: ₹{totalRec.toLocaleString("en-IN")}</div>
          </div>
        )}
        <label style={styles.label}>{t("notes", lang)}
          <input value={form.notes} onChange={(e) => set("notes", e.target.value)} style={styles.input} />
        </label>
      </div>
      <button
        onClick={() => { if (!saving && autoDay && form.familyId && (form.loanAmount || form.lastYearReceivable)) { setSaving(true); onSubmit({ ...form, year: String(currentYear) }); } }}
        style={{ ...styles.btnPrimary, width: "100%", marginTop: 16, background: "#b45309", opacity: (saving || !autoDay || !form.familyId || (!form.loanAmount && !form.lastYearReceivable)) ? 0.6 : 1 }}
        disabled={saving || !autoDay || !form.familyId || (!form.loanAmount && !form.lastYearReceivable)}
      >
        {saving ? "⏳ Saving..." : t("addLoan", lang)}
      </button>
    </Modal>
  );
}

// --- Loan Receive Form ---
function LoanReceiveForm({ loan, onSubmit, onClose }) {
  const lang = useLang();
  const [saving, setSaving] = useState(false);
  const remaining = (Number(loan.TotalReceivable) || 0) - (Number(loan.ReceivedAmount) || 0);
  const [amount, setAmount] = useState(String(remaining));
  const fmt = (v) => "₹" + Number(v || 0).toLocaleString("en-IN");

  return (
    <Modal title={t("receiveLoan", lang)} onClose={onClose}>
      <div style={{ background: "#f5f5f4", borderRadius: 8, padding: 12, marginBottom: 12 }}>
        <div style={{ fontWeight: 700, fontSize: 15 }}>{loan.FamilyName} <span style={{ color: "#a8a29e", fontSize: 12 }}>({loan.FamilyID})</span></div>
        <div style={{ fontSize: 13, marginTop: 4 }}>
          {t("loanAmount", lang)}: {fmt(loan.LoanAmount)} · {t("interestRate", lang).replace(" (%)", "")}: {loan.InterestRate}%
        </div>
        <div style={{ fontSize: 13 }}>{t("totalReceivable", lang)}: {fmt(loan.TotalReceivable)} · {t("receivedAmount", lang)}: {fmt(loan.ReceivedAmount)}</div>
        <div style={{ fontWeight: 700, color: "#b45309", marginTop: 4 }}>{lang === "ta" ? "நிலுவை" : "Balance Due"}: {fmt(remaining)}</div>
      </div>
      <div style={styles.formGrid}>
        <label style={styles.label}>{t("receiveAmount", lang)} (₹)
          <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} style={styles.input} max={remaining} />
        </label>
      </div>
      <button
        onClick={() => { if (!saving && amount && Number(amount) > 0) { setSaving(true); onSubmit({ loanId: loan.LoanID, receivedAmount: amount }); } }}
        style={{ ...styles.btnPrimary, width: "100%", marginTop: 16, background: "#16a34a", opacity: (saving || !amount || Number(amount) <= 0) ? 0.6 : 1 }}
        disabled={saving || !amount || Number(amount) <= 0}
      >
        {saving ? "⏳ Saving..." : t("receiveLoan", lang)}
      </button>
    </Modal>
  );
}

// --- Loan Edit Form ---
function LoanEditForm({ loan, families, onSubmit, onClose }) {
  const lang = useLang();
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState({
    familyId: loan.FamilyID || "",
    familyName: loan.FamilyName || "",
    lastYearReceivable: String(loan.LastYearReceivable || ""),
    loanAmount: String(loan.LoanAmount || ""),
    interestRate: String(loan.InterestRate || "9"),
    notes: loan.Notes || "",
  });
  const set = (k, v) => setForm((prev) => ({ ...prev, [k]: v }));
  const lastYrRec = Number(form.lastYearReceivable) || 0;
  const loanAmt = Number(form.loanAmount) || 0;
  const rate = Number(form.interestRate) || 0;
  const intOnLoan = Math.round(loanAmt * rate / 100);
  const intOnPrev = Math.round(lastYrRec * rate / 100);
  const intAmt = intOnLoan + intOnPrev;
  const totalRec = lastYrRec + loanAmt + intAmt;

  return (
    <Modal title={lang === "ta" ? "முன்பணம் திருத்து" : "Edit Advance"} onClose={onClose}>
      <div style={styles.formGrid}>
        <label style={styles.label}>{t("family", lang)}
          <select value={form.familyId} onChange={(e) => { const fam = families.find((f) => f.FamilyID === e.target.value); set("familyId", e.target.value); if (fam) set("familyName", fam.FamilyName); }} style={styles.input}>
            <option value="">{t("select", lang)}</option>
            {families.map((f) => (<option key={f.FamilyID} value={f.FamilyID}>{f.FamilyName} ({f.FamilyID})</option>))}
          </select>
        </label>
        <label style={styles.label}>{lang === "ta" ? "கடந்த ஆண்டு நிலுவை" : "Last Year Receivable"} (₹)
          <input type="number" value={form.lastYearReceivable} onChange={(e) => set("lastYearReceivable", e.target.value)} style={{ ...styles.input, background: "#fef3c7" }} placeholder="0" />
        </label>
        <label style={styles.label}>{t("loanAmount", lang)} (₹)
          <input type="number" value={form.loanAmount} onChange={(e) => set("loanAmount", e.target.value)} style={styles.input} />
        </label>
        <label style={styles.label}>{t("interestRate", lang)}
          <input type="number" value={form.interestRate} onChange={(e) => set("interestRate", e.target.value)} style={styles.input} step="0.5" />
        </label>
        {(loanAmt > 0 || lastYrRec > 0) && (
          <div style={{ background: "#f5f5f4", borderRadius: 8, padding: 12, fontSize: 13 }}>
            {lastYrRec > 0 && <div style={{ color: "#b45309" }}>{lang === "ta" ? "கடந்த ஆண்டு நிலுவை" : "Last Year Receivable"}: <strong>₹{lastYrRec.toLocaleString("en-IN")}</strong> (+ ₹{intOnPrev.toLocaleString("en-IN")} int)</div>}
            {loanAmt > 0 && <div>{lang === "ta" ? "கடன்" : "Loan"}: <strong>₹{loanAmt.toLocaleString("en-IN")}</strong> (+ ₹{intOnLoan.toLocaleString("en-IN")} int)</div>}
            <div style={{ fontSize: 12, color: "#78716c", marginTop: 2 }}>{t("interestAmount", lang)}: ₹{intAmt.toLocaleString("en-IN")} ({rate}%)</div>
            <div style={{ fontWeight: 700, fontSize: 15, marginTop: 4, color: "#b45309" }}>{t("totalReceivable", lang)}: ₹{totalRec.toLocaleString("en-IN")}</div>
          </div>
        )}
        <label style={styles.label}>{t("notes", lang)}
          <input value={form.notes} onChange={(e) => set("notes", e.target.value)} style={styles.input} />
        </label>
      </div>
      <button
        onClick={() => { if (!saving && form.familyId && (form.loanAmount || form.lastYearReceivable)) { setSaving(true); onSubmit({ ...form, loanId: loan.LoanID }); } }}
        style={{ ...styles.btnPrimary, width: "100%", marginTop: 16, background: "#2563eb", opacity: (saving || !form.familyId || (!form.loanAmount && !form.lastYearReceivable)) ? 0.6 : 1 }}
        disabled={saving || !form.familyId || (!form.loanAmount && !form.lastYearReceivable)}
      >
        {saving ? "⏳ Saving..." : t("loanEdited", lang)}
      </button>
    </Modal>
  );
}

// --- Loan Report (matching Inaththu Kanakku PDF format) ---
function LoanReport({ families, loans, currentYear }) {
  const lang = useLang();
  const fmt = (v) => "₹" + Number(v || 0).toLocaleString("en-IN");
  const fmtNum = (v) => Number(v || 0).toLocaleString("en-IN");
  const yearStr = String(currentYear);
  const prevYear = String(Number(currentYear) - 1);
  const titleYear = prevYear + "-" + yearStr.slice(2); // e.g. "2025-26"

  // Previous year outstanding from stored field on current year loans
  const prevByFamily = {};
  (loans || []).forEach((l) => {
    if (String(l.Year) === yearStr) {
      const fid = String(l.FamilyID || "").trim();
      const lyr = Number(l.LastYearReceivable) || 0;
      if (lyr > 0) {
        if (!prevByFamily[fid]) prevByFamily[fid] = 0;
        prevByFamily[fid] += lyr;
      }
    }
  });

  // Current year loans per family
  const currByFamily = {};
  (loans || []).forEach((l) => {
    if (String(l.Year) === yearStr) {
      const fid = String(l.FamilyID || "").trim();
      if (!currByFamily[fid]) currByFamily[fid] = { amount: 0, interest: 0, total: 0, received: 0, status: "—" };
      currByFamily[fid].amount += Number(l.LoanAmount) || 0;
      currByFamily[fid].interest += Number(l.InterestAmount) || 0;
      currByFamily[fid].total += Number(l.TotalReceivable) || 0;
      currByFamily[fid].received += Number(l.ReceivedAmount) || 0;
      currByFamily[fid].status = l.RecStatus || "Pending";
    }
  });

  const currYearLoans = (loans || []).filter((l) => String(l.Year) === yearStr);
  const defaultRate = currYearLoans.length > 0 ? (Number(currYearLoans[0].InterestRate) || 9) : 9;

  const rows = (families || []).map((f, idx) => {
    const fid = String(f.FamilyID || "").trim();
    const prev = prevByFamily[fid] || 0;
    const d = currByFamily[fid] || { amount: 0, interest: 0, total: 0, received: 0, status: "—" };
    return { sl: idx + 1, id: fid, name: f.FamilyName, prevOutstanding: prev, ...d };
  });

  rows.sort((a, b) => {
    const numA = parseInt(String(a.id).replace(/\D/g, "")) || 0;
    const numB = parseInt(String(b.id).replace(/\D/g, "")) || 0;
    return numA - numB;
  });

  const totals = rows.reduce((s, r) => ({
    prevOutstanding: s.prevOutstanding + r.prevOutstanding,
    amount: s.amount + r.amount,
    interest: s.interest + r.interest,
    total: s.total + r.total,
    received: s.received + r.received,
  }), { prevOutstanding: 0, amount: 0, interest: 0, total: 0, received: 0 });

  // --- PDF Download ---
  const downloadPDF = () => {
    const printWin = window.open("", "_blank");
    if (!printWin) return;
    const htmlRows = rows.map((r) => {
      const statusText = r.amount > 0 ? (r.status === "Received" ? "✅ Received" : r.status === "Partial" ? "🔶 Partial" : "⏳ Pending") : "";
      return `<tr style="background:${r.amount > 0 || r.prevOutstanding > 0 ? '#fefce8' : '#fff'}">
        <td style="text-align:center;padding:4px 6px;border:1px solid #999">${r.sl}</td>
        <td style="padding:4px 6px;border:1px solid #999">${r.name}</td>
        <td style="text-align:right;padding:4px 6px;border:1px solid #999">${r.prevOutstanding > 0 ? fmtNum(r.prevOutstanding) : '0'}</td>
        <td style="text-align:right;padding:4px 6px;border:1px solid #999">${r.amount > 0 ? fmtNum(r.amount) : '0'}</td>
        <td style="text-align:right;padding:4px 6px;border:1px solid #999">${r.interest > 0 ? fmtNum(r.interest) : '0'}</td>
        <td style="text-align:right;padding:4px 6px;border:1px solid #999;font-weight:bold">${r.total > 0 ? fmtNum(r.total) : '0'}</td>
        <td style="text-align:right;padding:4px 6px;border:1px solid #999;color:green">${r.received > 0 ? fmtNum(r.received) : '0'}</td>
        <td style="text-align:center;padding:4px 6px;border:1px solid #999">${statusText}</td>
      </tr>`;
    }).join("");
    const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${titleYear} Inaththu Kanakku</title>
      <style>body{font-family:Arial,sans-serif;margin:20px}table{border-collapse:collapse;width:100%}
      @media print{body{margin:10px}button{display:none!important}}</style></head><body>
      <div style="background:#fef3c7;padding:16px;text-align:center;border:2px solid #92400e;margin-bottom:16px">
        <h2 style="margin:0;color:#1a237e">${titleYear} Amount advanced to Pangalis'</h2>
        <h3 style="margin:4px 0 0;color:#1a237e">(Inaththu kanakku)</h3>
      </div>
      <table>
        <thead>
          <tr style="background:#1a237e;color:#fdd835">
            <th style="padding:8px 6px;border:1px solid #999;width:40px">Sl.<br>No.</th>
            <th style="padding:8px 6px;border:1px solid #999;text-align:left">Name</th>
            <th style="padding:8px 6px;border:1px solid #999;text-align:right">Last Year<br>Receivable</th>
            <th style="padding:8px 6px;border:1px solid #999;text-align:right">Amount</th>
            <th style="padding:8px 6px;border:1px solid #999;text-align:right">Int @${defaultRate}%</th>
            <th style="padding:8px 6px;border:1px solid #999;text-align:right">Total</th>
            <th style="padding:8px 6px;border:1px solid #999;text-align:right;background:#16a34a;color:#fff">Rec.<br>Amt</th>
            <th style="padding:8px 6px;border:1px solid #999;text-align:center;background:#16a34a;color:#fff">Rec.<br>Status</th>
          </tr>
        </thead>
        <tbody>${htmlRows}</tbody>
        <tfoot>
          <tr style="background:#1a237e;color:#fff;font-weight:bold">
            <td colspan="2" style="padding:6px;border:1px solid #999">Total</td>
            <td style="text-align:right;padding:6px;border:1px solid #999">${fmtNum(totals.prevOutstanding)}</td>
            <td style="text-align:right;padding:6px;border:1px solid #999">${fmtNum(totals.amount)}</td>
            <td style="text-align:right;padding:6px;border:1px solid #999">${fmtNum(totals.interest)}</td>
            <td style="text-align:right;padding:6px;border:1px solid #999">${fmtNum(totals.total)}</td>
            <td style="text-align:right;padding:6px;border:1px solid #999">${fmtNum(totals.received)}</td>
            <td style="padding:6px;border:1px solid #999"></td>
          </tr>
        </tfoot>
      </table>
      <button onclick="window.print()" style="margin-top:16px;padding:10px 24px;background:#1a237e;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer">🖨️ Print / Save as PDF</button>
      </body></html>`;
    printWin.document.write(html);
    printWin.document.close();
  };

  const cellStyle = { padding: "5px 6px", borderBottom: "1px solid #e7e5e4", fontSize: 11 };
  const headStyle = { ...cellStyle, fontWeight: 700, background: "#1a237e", color: "#fdd835", position: "sticky", top: 0, fontSize: 10, whiteSpace: "nowrap" };
  const greenHead = { ...headStyle, background: "#16a34a", color: "#fff" };

  return (
    <div style={{ ...styles.card, padding: 0, overflow: "hidden" }}>
      <div style={{ padding: "12px 16px", background: "#fef3c7", borderBottom: "2px solid #92400e", textAlign: "center" }}>
        <h3 style={{ margin: 0, fontSize: 16, color: "#1a237e" }}>{titleYear} Amount advanced to Pangalis'</h3>
        <div style={{ fontSize: 13, color: "#1a237e", fontWeight: 600 }}>(Inaththu kanakku)</div>
        <button onClick={downloadPDF} style={{ marginTop: 8, padding: "6px 16px", background: "#1a237e", color: "#fff", border: "none", borderRadius: 6, fontSize: 12, cursor: "pointer", fontWeight: 600 }}>
          📄 Download PDF
        </button>
      </div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr>
              <th style={{ ...headStyle, textAlign: "center", width: 28 }}>Sl.<br/>No.</th>
              <th style={headStyle}>Name</th>
              <th style={{ ...headStyle, textAlign: "right" }}>Last Year<br/>Receivable</th>
              <th style={{ ...headStyle, textAlign: "right" }}>Amount</th>
              <th style={{ ...headStyle, textAlign: "right" }}>Int @{defaultRate}%</th>
              <th style={{ ...headStyle, textAlign: "right" }}>Total</th>
              <th style={{ ...greenHead, textAlign: "right" }}>Rec.<br/>Amt</th>
              <th style={{ ...greenHead, textAlign: "center" }}>Rec.<br/>Status</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r) => {
              const hasData = r.amount > 0 || r.prevOutstanding > 0;
              return (
                <tr key={r.id} style={{ background: hasData ? "#fefce8" : "#fff" }}>
                  <td style={{ ...cellStyle, textAlign: "center", color: "#a8a29e" }}>{r.sl}</td>
                  <td style={cellStyle}>{r.name}</td>
                  <td style={{ ...cellStyle, textAlign: "right", color: r.prevOutstanding > 0 ? "#b45309" : "#78716c" }}>{r.prevOutstanding > 0 ? fmtNum(r.prevOutstanding) : "0"}</td>
                  <td style={{ ...cellStyle, textAlign: "right", fontWeight: r.amount > 0 ? 600 : 400 }}>{r.amount > 0 ? fmtNum(r.amount) : "0"}</td>
                  <td style={{ ...cellStyle, textAlign: "right" }}>{r.interest > 0 ? fmtNum(r.interest) : "0"}</td>
                  <td style={{ ...cellStyle, textAlign: "right", fontWeight: 600 }}>{r.total > 0 ? fmtNum(r.total) : "0"}</td>
                  <td style={{ ...cellStyle, textAlign: "right", color: r.received > 0 ? "#16a34a" : "#78716c" }}>{r.received > 0 ? fmtNum(r.received) : "0"}</td>
                  <td style={{ ...cellStyle, textAlign: "center" }}>
                    {r.amount > 0 ? (
                      <span style={{ fontSize: 11, fontWeight: 700, color: r.status === "Received" ? "#16a34a" : r.status === "Partial" ? "#d97706" : "#dc2626" }}>
                        {r.status === "Received" ? "✅" : r.status === "Partial" ? "🔶" : "⏳"}
                      </span>
                    ) : ""}
                  </td>
                </tr>
              );
            })}
          </tbody>
          <tfoot>
            <tr style={{ background: "#1a237e", color: "#fff", fontWeight: 700 }}>
              <td colSpan="2" style={{ ...cellStyle, color: "#fff" }}>Total</td>
              <td style={{ ...cellStyle, textAlign: "right", color: "#fdd835" }}>{fmtNum(totals.prevOutstanding)}</td>
              <td style={{ ...cellStyle, textAlign: "right", color: "#fff" }}>{fmtNum(totals.amount)}</td>
              <td style={{ ...cellStyle, textAlign: "right", color: "#fff" }}>{fmtNum(totals.interest)}</td>
              <td style={{ ...cellStyle, textAlign: "right", color: "#fff" }}>{fmtNum(totals.total)}</td>
              <td style={{ ...cellStyle, textAlign: "right", color: "#4ade80" }}>{fmtNum(totals.received)}</td>
              <td style={cellStyle}></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

    CREATE: "#059669", BID: "#2563eb", CONFIRM: "#7c3aed",
    LOGIN: "#6b7280", LOGOUT: "#6b7280", UPDATE: "#d97706", DELETE: "#dc2626", EDIT: "#d97706",

  <script>
    // Unregister any existing service worker and clear caches
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        registrations.forEach(function(reg) { reg.unregister(); });
      });
      if (window.caches) {
        caches.keys().then(function(names) {
          names.forEach(function(name) { caches.delete(name); });
        });
      }
    }
