// --- CSV Export Utility ---
function exportToCSV(filename, headers, rows) {
  const escape = (v) => {
    const s = String(v == null ? "" : v);
    return s.includes(",") || s.includes('"') || s.includes("\n") ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const csv = [headers.map(escape).join(","), ...rows.map((r) => r.map(escape).join(","))].join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

// --- Offline Queue ---
const OFFLINE_QUEUE_KEY = "prayer_offline_queue";

function getOfflineQueue() {
  try {
    return JSON.parse(localStorage.getItem(OFFLINE_QUEUE_KEY) || "[]");
  } catch { return []; }
}

function addToOfflineQueue(entry) {
  const queue = getOfflineQueue();
  queue.push({ ...entry, _offlineId: Date.now() + "-" + Math.random().toString(36).slice(2, 8), _timestamp: new Date().toISOString() });
  localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queue));
  return queue.length;
}

function removeFromOfflineQueue(offlineId) {
  const queue = getOfflineQueue().filter((e) => e._offlineId !== offlineId);
  localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(queue));
}

function clearOfflineQueue() {
  localStorage.setItem(OFFLINE_QUEUE_KEY, "[]");
}

// --- Photo Helper (compress & convert to base64) ---
function compressImage(file, maxWidth = 800, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        let w = img.width, h = img.height;
        if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
        canvas.width = w;
        canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// --- Apps Script Backend Helper ---
class AppBackend {
  constructor(userEmail) {
    this.userEmail = userEmail;
    this.url = APPS_SCRIPT_URL;
  }

  async post(action, data = {}) {
    const res = await fetch(this.url, {
      method: "POST",
      body: JSON.stringify({ action, data, userEmail: this.userEmail }),
    });
    const text = await res.text();
    let result;
    try {
      result = JSON.parse(text);
    } catch(e) {
      console.error("Backend returned non-JSON:", text.substring(0, 200));
      throw new Error("Backend returned invalid response");
    }
    if (!result.success) throw new Error(result.error || "Unknown error");
    return result.data;
  }

  async loadAll() {
    return this.post("loadAll");
  }

  async checkAccess() {
    return this.post("checkAccess");
  }
}

  const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
  const [isOnline, setIsOnline] = useState(navigator.onLine);
  const [offlineCount, setOfflineCount] = useState(getOfflineQueue().length);

  const backendRef = useRef(null);

  // Online/Offline listener
  useEffect(() => {
    const onOnline = () => { setIsOnline(true); };
    const onOffline = () => { setIsOnline(false); };
    window.addEventListener("online", onOnline);
    window.addEventListener("offline", onOffline);
    return () => { window.removeEventListener("online", onOnline); window.removeEventListener("offline", onOffline); };
  }, []);

  // Audit helper
  const audit = (action, module, details) =>
    logAudit(action, module, details, user?.email, IS_DEMO, setAuditLog);

  // --- Toast ---
  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  }, []);

  // --- Sync offline queue ---
  const syncOfflineQueue = useCallback(async () => {
    if (!backendRef.current || IS_DEMO) return;
    const queue = getOfflineQueue();
    if (queue.length === 0) return;
    let synced = 0, failed = 0;
    for (const entry of queue) {
      try {
        const { _offlineId, _timestamp, action, ...data } = entry;
        await backendRef.current.post(action, data);
        removeFromOfflineQueue(_offlineId);
        synced++;
      } catch (e) {
        console.error("Sync failed for", entry._offlineId, e);
        failed++;
      }
    }
    setOfflineCount(getOfflineQueue().length);
    if (synced > 0) {
      // Refresh data
      try {
        const result = await backendRef.current.post("getData");
        if (result.families) setFamilies(result.families);
        if (result.income) setDonations(result.income);
        if (result.expenses) setExpenses(result.expenses);
        if (result.auction) setAuction(result.auction);
        if (result.ledger) setLedger(result.ledger);
        if (result.auditLog) setAuditLog(result.auditLog);
      } catch (e) { console.error("Post-sync refresh failed:", e); }
    }
    if (failed > 0) showToast(t("toastSyncFailed", lang), "error");
    else if (synced > 0) showToast(t("toastSynced", lang), "success");
  }, [lang, showToast]);

  // Auto-sync when coming back online
  useEffect(() => {
    if (isOnline && offlineCount > 0 && backendRef.current) {
      syncOfflineQueue();
    }
  }, [isOnline, syncOfflineQueue, offlineCount]);

  // Offline-aware submit: tries backend, falls back to offline queue
  const submitOrQueue = useCallback(async (action, data, successMsg) => {
    if (IS_DEMO) return false; // demo mode handles its own state
    if (!isOnline) {
      addToOfflineQueue({ action, ...data });
      setOfflineCount(getOfflineQueue().length);
      showToast(t("toastOfflineSaved", lang), "info");
      return "offline";
    }
    try {
      await backendRef.current.post(action, data);
      return "success";
    } catch (e) {
      // Network error — queue offline
      if (e.message && (e.message.includes("fetch") || e.message.includes("network") || e.message.includes("Failed"))) {
        addToOfflineQueue({ action, ...data });
        setOfflineCount(getOfflineQueue().length);
        showToast(t("toastOfflineSaved", lang), "info");
        return "offline";
      }
      throw e;
    }
  }, [isOnline, lang, showToast]);

  // --- Demo login ---
  useEffect(() => {
    if (IS_DEMO) {
      // Auto-login as admin in demo mode
      setUser({
        email: "admin@example.com",
        name: "Demo Admin",
        picture: "",
        token: null,
      });
      setRole("Admin");
      const mock = createMockData();
      setFamilies(mock.families);
      setDonations(mock.donations);
      setExpenses(mock.expenses);
      setAuction(mock.auction);
      setAccessList(mock.access);
      setAuditLog([{ Timestamp: now(), User: "admin@example.com", Action: "LOGIN", Module: "Auth", Details: "Demo Admin logged in" }]);
      setLoading(false);
    }
  }, []);

  // --- Google Sign-In (real mode) ---
  const googleReadyRef = useRef(false);
  
  const initGoogle = useCallback(() => {
    if (window.google && window.google.accounts) {
      window.google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleLogin,
        auto_select: false,
        use_fedcm_for_prompt: false,
      });
      googleReadyRef.current = true;
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    if (IS_DEMO) return;
    if (window.google && window.google.accounts) {
      initGoogle();
      return;
    }
    const interval = setInterval(() => {
      if (window.google && window.google.accounts) {
        clearInterval(interval);
        initGoogle();
      }
    }, 200);
    setTimeout(() => { clearInterval(interval); setLoading(false); }, 10000);
    return () => clearInterval(interval);
  }, []);

  const handleSignInClick = () => {
    if (!googleReadyRef.current) {
      alert("Google Sign-In is still loading. Please wait a moment and try again.");
      return;
    }
    // Method 1: Try prompt (One Tap)
    window.google.accounts.id.prompt((notification) => {
      if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
        // Method 2: Fall back to renderButton in a popup
        const btnDiv = document.getElementById("google-signin-btn-hidden");
        if (btnDiv) {
          btnDiv.innerHTML = "";
          window.google.accounts.id.renderButton(btnDiv, {
            theme: "outline", size: "large", width: 300, text: "signin_with",
          });
          // Click the rendered button
          setTimeout(() => {
            const gBtn = btnDiv.querySelector('[role="button"]') || btnDiv.querySelector('div[style]');
            if (gBtn) gBtn.click();
          }, 300);
        }
      }
    });
  };

  const handleGoogleLogin = async (response) => {
    try {
      const payload = JSON.parse(atob(response.credential.split(".")[1]));
      const u = {
        email: payload.email,
        name: payload.name,
        picture: payload.picture,
        token: response.credential,
      };
      setUser(u);
      backendRef.current = new AppBackend(u.email);
      await loadAllData(u.email);
    } catch (e) {
      setError("Login failed: " + e.message);
    }
  };

  const loadAllData = async (email) => {
    try {
      setLoading(true);
      const api = backendRef.current;
      const result = await api.loadAll();
      setFamilies(result.families || []);
      setDonations(result.income || []);
      setExpenses(result.expenses || []);
      setAuction(result.auction || []);
      setAccessList(result.access || []);
      if (result.auditLog) setAuditLog(result.auditLog.reverse());
      if (result.ledger) setLedger(result.ledger);
      setRole(result.role || null);
    } catch (e) {
      setError("Failed to load data: " + e.message);
    } finally {
      setLoading(false);
    }
  };

  const handleDemoRoleSwitch = (newRole) => {
    const emailMap = { Admin: "admin@example.com", Editor: "editor@example.com", Viewer: "viewer@example.com" };
    setRole(newRole);
    setUser({ email: emailMap[newRole], name: `Demo ${newRole}`, picture: "", token: null });
  };

  const logout = () => {
    audit("LOGOUT", "Auth", `${user?.name || user?.email} logged out`);
    setUser(null);
    setRole(null);
    setActiveTab("dashboard");
  };

  // --- Data operations (local for demo, Apps Script for real) ---
  const addDonation = async (donation) => {
    const row = {
      TxnID: generateId("DON"),
      Year: donation.year || String(new Date().getFullYear()),
      Day: donation.day,
      DonorType: donation.donorType,
      FamilyID: donation.familyId || "",
      DonorName: donation.donorName,
      Category: donation.category,
      Amount: donation.amount,
      Description: donation.description || "",
      EnteredBy: user.email,
      Timestamp: now(),
    };
    if (!IS_DEMO) {
      await backendRef.current.post("addIncome", donation);
    }
    setDonations((prev) => [...prev, row]);

    // Auto-add to auction if category is "Objects for Auction"
    if (donation.category === "Objects for Auction" && donation.description) {
      const auctionRow = {
        ItemNo: String(auction.length + 1),
        Year: donation.year || String(new Date().getFullYear()),
        ItemDescription: donation.description,
        DonatedBy: donation.donorName,
        WinnerFamilyID: "",
        WinnerName: "",
        BidAmount: "",
        EnteredBy1: "",
        ConfirmedBy2: "",
        Timestamp1: "",
        Timestamp2: "",
        Status: "",
      };
      // Backend already handles auction auto-add
      setAuction((prev) => [...prev, auctionRow]);
    }

    showToast(t("toastDonation", lang));
    audit("CREATE", "Income", `${row.TxnID} ₹${row.Amount} ${row.Category} by ${row.DonorName}`);
    if (donation.category === "Objects for Auction" && donation.description) {
      audit("CREATE", "Auction", `Auto-added "${donation.description}" from income by ${donation.donorName}`);
    }
    setShowForm(null);
  };

  const addAuctionItem = async (item) => {
    const row = {
      ItemNo: String(auction.length + 1),
      Year: item.year || String(new Date().getFullYear()),
      ItemDescription: item.itemName,
      DonatedBy: item.donatedBy || "",
      WinnerFamilyID: "",
      WinnerName: "",
      BidAmount: "",
      EnteredBy1: "",
      ConfirmedBy2: "",
      Timestamp1: "",
      Timestamp2: "",
      Status: "",
    };
    if (!IS_DEMO) {
      await backendRef.current.post("addAuctionItem", item);
    }
    setAuction((prev) => [...prev, row]);
    showToast(t("toastItemAdded", lang));
    audit("CREATE", "Auction", `Manual add #${row.ItemNo} "${item.itemName}"${item.donatedBy ? ` by ${item.donatedBy}` : ""}`);
    setShowForm(null);
  };

  const addExpense = async (expense) => {
    const row = {
      TxnID: generateId("EXP"),
      Year: expense.year || String(new Date().getFullYear()),
      Day: expense.day,
      Category: expense.category,
      Description: expense.description,
      Amount: expense.amount,
      Vendor: expense.vendor || "",
      EnteredBy: user.email,
      Timestamp: now(),
    };
    if (!IS_DEMO) {
      await backendRef.current.post("addExpense", expense);
    }
    setExpenses((prev) => [...prev, row]);
    showToast(t("toastExpense", lang));
    audit("CREATE", "Expenses", `${row.TxnID} ₹${row.Amount} ${row.Category} - ${row.Description}`);
    setShowForm(null);
  };

  const addFamily = async (family) => {
    const row = {
      FamilyID: generateId("FAM"),
      FamilyName: family.familyName,
      Phone: family.phone,
      WhatsApp: family.whatsApp || "",
      Address: family.address,
    };
    if (!IS_DEMO) {
      await backendRef.current.post("addFamily", family);
    }
    setFamilies((prev) => [...prev, row]);
    showToast(t("toastFamily", lang));
    audit("CREATE", "Families", `${row.FamilyID} ${row.FamilyName}`);
    setShowForm(null);
  };

  const enterAuctionBid = async (itemIndex, bid) => {
    const updated = [...auction];
    const item = { ...updated[itemIndex] };
    if (!item.EnteredBy1 || item.EnteredBy1 === "") {
      // First entry
      item.WinnerFamilyID = bid.familyId;
      item.WinnerName = bid.winnerName;
      item.BidAmount = bid.amount;
      item.EnteredBy1 = user.email;
      item.Timestamp1 = now();
      item.Status = "Pending";
    } else if (item.EnteredBy1 !== user.email && (!item.ConfirmedBy2 || item.ConfirmedBy2 === "")) {
      // Second person confirms
      item.ConfirmedBy2 = user.email;
      item.Timestamp2 = now();
      item.Status = "Confirmed";
    } else {
      showToast(t("toastBidSelfError", lang), "error");
      return;
    }
    updated[itemIndex] = item;
    if (!IS_DEMO) {
      await backendRef.current.post("enterBid", { ...bid, rowIndex: itemIndex });
    }
    setAuction(updated);
    if (item.Status === "Confirmed") {
      showToast(t("toastBidConfirm", lang));
      audit("CONFIRM", "Auction", `#${item.ItemNo} "${item.ItemDescription}" ₹${item.BidAmount} to ${item.WinnerName}`);
    } else {
      showToast(t("toastBidSubmit", lang));
      audit("BID", "Auction", `#${item.ItemNo} "${item.ItemDescription}" ₹${bid.amount} by ${bid.winnerName}`);
    }
  };

  // --- Computed values (filtered by selected year) ---
  const yearStr = String(currentYear);
  const yearDonations = donations.filter((d) => String(d.Year) === yearStr);
  const yearExpenses = expenses.filter((e) => String(e.Year) === yearStr);
  const yearAuction = auction.filter((a) => String(a.Year) === yearStr);
  const totalDonations = yearDonations.reduce((s, d) => s + Number(d.Amount || 0), 0);
  const totalExpenses = yearExpenses.reduce((s, e) => s + Number(e.Amount || 0), 0);
  const totalAuction = yearAuction
    .filter((a) => a.Status === "Confirmed")
    .reduce((s, a) => s + Number(a.BidAmount || 0), 0);
  const balance = totalDonations + totalAuction - totalExpenses;

  const canEdit = role === "Admin" || role === "Editor";
  const isAdmin = role === "Admin";

  // ============================================================
  // RENDER
  // ============================================================

  if (loading) return <LangContext.Provider value={lang}><LoadingScreen /></LangContext.Provider>;
  if (!user) return <LangContext.Provider value={lang}><LoginScreen lang={lang} setLang={setLang} onDemoLogin={() => {
    setUser({ email: "admin@example.com", name: "Demo Admin", picture: "", token: null });
    setRole("Admin");
    const mock = createMockData();
    setFamilies(mock.families);
    setDonations(mock.donations);
    setExpenses(mock.expenses);
    setAuction(mock.auction);
    setAccessList(mock.access);
  }} /></LangContext.Provider>;
  if (!role) return <LangContext.Provider value={lang}><NoAccessScreen email={user.email} onLogout={logout} /></LangContext.Provider>;

  return (
    <LangContext.Provider value={lang}>
    <div style={styles.app}>
      {/* Header */}
      <header style={styles.header}>
        <div style={styles.headerInner}>
          <div style={styles.headerLeft}>
            <div style={styles.logo}>🪔</div>
            <div>
              <h1 style={styles.headerTitle}>{t("appTitle", lang)}</h1>
              <p style={styles.headerSubtitle}>
                {t("appSubtitle", lang === "ta" ? "en" : "ta")} ·{" "}
                <select
                  value={currentYear}
                  onChange={(e) => setCurrentYear(Number(e.target.value))}
                  style={{ background: "transparent", color: "inherit", border: "1px solid rgba(255,255,255,0.4)", borderRadius: 4, padding: "1px 4px", fontSize: "inherit", fontFamily: "inherit", cursor: "pointer" }}
                >
                  {Array.from({ length: 5 }, (_, i) => new Date().getFullYear() - 2 + i).map((y) => (
                    <option key={y} value={y} style={{ color: "#1a1a1a" }}>{y}</option>
                  ))}
                </select>
              </p>
            </div>
          </div>
          <div style={styles.headerRight}>
            {/* Language Toggle */}
            <button
              onClick={() => setLang(lang === "en" ? "ta" : "en")}
              style={styles.langToggle}
              title={lang === "en" ? "Switch to Tamil" : "Switch to English"}
            >
              {lang === "en" ? "தமிழ்" : "ENG"}
            </button>
            <div style={styles.userBadge}>
              <span style={styles.rolePill}>{role}</span>
              <span style={styles.userName}>{user.name?.split(" ")[0]}</span>
            </div>
            <button onClick={logout} style={styles.logoutBtn}>↗</button>
          </div>
        </div>
        {IS_DEMO && (
          <div style={styles.demoBanner}>
            <span>{t("demoMode", lang)} </span>
            {["Admin", "Editor", "Viewer"].map((r) => (
              <button
                key={r}
                onClick={() => handleDemoRoleSwitch(r)}
                style={{
                  ...styles.demoRoleBtn,
                  background: role === r ? "#fff" : "transparent",
                  color: role === r ? "#b45309" : "#fff",
                }}
              >
                {r}
              </button>
            ))}
          </div>
        )}
      </header>

      {/* Toast */}
      {toast && (
        <div style={{
          ...styles.toast,
          background: toast.type === "error" ? "#dc2626" : toast.type === "info" ? "#2563eb" : "#059669",
        }}>
          {toast.msg}
        </div>
      )}

      {/* Offline banner */}
      {!isOnline && (
        <div style={{ background: "#fef3c7", color: "#92400e", padding: "8px 16px", textAlign: "center", fontSize: 13, fontWeight: 600 }}>
          {t("offlineBanner", lang)}
        </div>
      )}
      {offlineCount > 0 && isOnline && (
        <div style={{ background: "#dbeafe", color: "#1e40af", padding: "8px 16px", textAlign: "center", fontSize: 13, display: "flex", justifyContent: "center", alignItems: "center", gap: 12 }}>
          <span>🔄 {offlineCount} {t("pendingSync", lang)}</span>
          <button onClick={syncOfflineQueue} style={{ background: "#2563eb", color: "#fff", border: "none", borderRadius: 8, padding: "4px 12px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
            {t("syncNow", lang)}
          </button>
        </div>
      )}

      {/* Main Content */}
      <main style={styles.main}>
        {activeTab === "dashboard" && (
          <Dashboard
            totalDonations={totalDonations}
            totalExpenses={totalExpenses}
            totalAuction={totalAuction}
            balance={balance}
            donations={yearDonations}
            expenses={yearExpenses}
            auction={yearAuction}
            families={families}
          />
        )}
        {activeTab === "donations" && (
          <DonationsView
            donations={yearDonations}
            families={families}
            canEdit={canEdit}
            onAdd={() => setShowForm("donation")}
            showToast={showToast}
            lang={lang}
          />
        )}
        {activeTab === "expenses" && (
          <ExpensesView
            expenses={yearExpenses}
            canEdit={canEdit}
            onAdd={() => setShowForm("expense")}
            showToast={showToast}
            lang={lang}
          />
        )}
        {activeTab === "auction" && (
          <AuctionView
            auction={yearAuction}
            families={families}
            canEdit={canEdit}
            isAdmin={isAdmin}
            userEmail={user.email}
            onBid={enterAuctionBid}
            onAddItem={() => setShowForm("auctionItem")}
            showToast={showToast}
            lang={lang}
            backend={backendRef.current}
          />
        )}
        {activeTab === "families" && (
          <FamiliesView
            families={families}
            isAdmin={isAdmin}
            canEdit={canEdit}
            onAdd={() => setShowForm("family")}
            showToast={showToast}
            lang={lang}
          />
        )}
        {activeTab === "reports" && (
          <ReportsView
            families={families}
            donations={yearDonations}
            expenses={yearExpenses}
            auction={yearAuction}
            totalDonations={totalDonations}
            totalExpenses={totalExpenses}
            totalAuction={totalAuction}
            balance={balance}
            ledger={ledger}
            currentYear={currentYear}
            showToast={showToast}
            lang={lang}
          />
        )}
        {activeTab === "auditlog" && isAdmin && (
          <AuditLogView entries={auditLog} />
        )}
      </main>

      {/* Forms (Modal) */}
      {showForm === "donation" && (
        <DonationForm
          families={families}
          onSubmit={addDonation}
          onClose={() => setShowForm(null)}
        />
      )}
      {showForm === "expense" && (
        <ExpenseForm
          onSubmit={addExpense}
          onClose={() => setShowForm(null)}
        />
      )}
      {showForm === "family" && (
        <FamilyForm
          onSubmit={addFamily}
          onClose={() => setShowForm(null)}
        />
      )}
      {showForm === "auctionItem" && (
        <AuctionItemForm
          onSubmit={addAuctionItem}
          onClose={() => setShowForm(null)}
        />
      )}

      {/* Bottom Nav */}
      <nav style={styles.nav}>
        {[
          { id: "dashboard", icon: "📊", label: t("navHome", lang) },
          { id: "donations", icon: "💰", label: t("navDonate", lang) },
          { id: "expenses", icon: "💸", label: t("navExpense", lang) },
          { id: "auction", icon: "🔨", label: t("navAuction", lang) },
          { id: "families", icon: "👨‍👩‍👧‍👦", label: t("navFamily", lang) },
          { id: "reports", icon: "📋", label: t("navReports", lang) },
          ...(isAdmin ? [{ id: "auditlog", icon: "📜", label: t("navAuditLog", lang) }] : []),
        ].map((tab) => (
          <button
            key={tab.id}
            onClick={() => setActiveTab(tab.id)}
            style={{
              ...styles.navBtn,
              color: activeTab === tab.id ? "#b45309" : "#78716c",
              borderTop: activeTab === tab.id ? "3px solid #b45309" : "3px solid transparent",
            }}
          >
            <span style={{ fontSize: 20 }}>{tab.icon}</span>
            <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: 0.5 }}>{tab.label}</span>
          </button>
        ))}
      </nav>

      {/* Setup Instructions (shown once in demo) */}
      {IS_DEMO && activeTab === "dashboard" && <SetupInstructions />}
    </div>
    </LangContext.Provider>
  );
}

function LoadingScreen() {
  const lang = useLang();
  return (
    <div style={styles.centerScreen}>
      <div style={styles.spinner} />
      <p style={{ color: "#78716c", marginTop: 16, fontFamily: "'Cormorant Garamond', serif" }}>
        {t("loading", lang)}
      </p>
    </div>
  );
}

function LoginScreen({ onDemoLogin, lang, setLang }) {
  useEffect(() => {
    if (IS_DEMO) return;
    let rendered = false;
    let interval;
    const tryRender = () => {
      if (rendered) return;
      const el = document.getElementById("g-signin-btn");
      if (el && window.google && window.google.accounts) {
        el.innerHTML = "";
        window.google.accounts.id.renderButton(el, {
          theme: "outline",
          size: "large",
          width: 300,
          text: "signin_with",
          shape: "rectangular",
        });
        rendered = true;
        if (interval) clearInterval(interval);
      }
    };
    tryRender();
    interval = setInterval(tryRender, 500);
    setTimeout(() => clearInterval(interval), 10000);
    return () => clearInterval(interval);
  }, []);
  return (
    <div style={styles.loginScreen}>
      <div style={styles.loginCard}>
        {/* Language toggle on login */}
        <button
          onClick={() => setLang(lang === "en" ? "ta" : "en")}
          style={{ ...styles.langToggle, position: "absolute", top: 16, right: 16, background: "#292524", color: "#fff" }}
        >
          {lang === "en" ? "தமிழ்" : "ENG"}
        </button>
        <div style={{ fontSize: 64, marginBottom: 8 }}>🪔</div>
        <h1 style={styles.loginTitle}>குடும்ப பிரார்த்தனை</h1>
        <p style={styles.loginSubtitle}>{t("loginTitle", lang)}</p>
        <div style={styles.loginDivider} />
        {!IS_DEMO ? (
          <div style={{ marginTop: 24 }}>
            <div id="g-signin-btn" style={{ display: "flex", justifyContent: "center", minHeight: 44 }} />
          </div>
        ) : (
          <button onClick={onDemoLogin} style={styles.googleBtn}>
            {t("enterDemo", lang)}
          </button>
        )}
        <p style={styles.loginFooter}>
          {t("loginFooter", lang)}
        </p>
      </div>
    </div>
  );
}

function NoAccessScreen({ email, onLogout }) {
  const lang = useLang();
  return (
    <div style={styles.centerScreen}>
      <div style={{ textAlign: "center", padding: 32 }}>
        <div style={{ fontSize: 48 }}>🔒</div>
        <h2 style={{ fontFamily: "'Cormorant Garamond', serif", color: "#292524", marginTop: 16 }}>
          {t("accessPending", lang)}
        </h2>
        <p style={{ color: "#78716c", marginTop: 8, maxWidth: 300 }}>
          <strong>{email}</strong> {t("noAccess", lang)}
        </p>
        <button onClick={onLogout} style={{ ...styles.btnPrimary, marginTop: 24 }}>
          {t("signOut", lang)}
        </button>
      </div>
    </div>
  );
}

// ============================================================
// DASHBOARD
// ============================================================

function Dashboard({ totalDonations, totalExpenses, totalAuction, balance, donations, expenses, auction, families }) {
  const lang = useLang();
  const confirmedAuctions = auction.filter((a) => a.Status === "Confirmed").length;
  const pendingAuctions = auction.filter((a) => a.Status === "Pending").length;

  return (
    <div style={styles.page}>
      <h2 style={styles.pageTitle}>{t("dashboard", lang)}</h2>

      {/* Summary Cards */}
      <div style={styles.cardGrid}>
        <div style={{ ...styles.summaryCard, background: "linear-gradient(135deg, #065f46, #059669)" }}>
          <p style={styles.cardLabel}>{t("totalDonations", lang)}</p>
          <p style={styles.cardValue}>{formatCurrency(totalDonations)}</p>
          <p style={styles.cardCount}>{donations.length} {t("entries", lang)}</p>
        </div>
        <div style={{ ...styles.summaryCard, background: "linear-gradient(135deg, #92400e, #b45309)" }}>
          <p style={styles.cardLabel}>{t("auctionIncome", lang)}</p>
          <p style={styles.cardValue}>{formatCurrency(totalAuction)}</p>

          <span style={styles.statLabel}>{t("unsoldItems", lang)}</span>

        {[1, 2, 3].map((day) => {
          const dayDon = donations.filter((d) => d.Day === String(day));
          const dayExp = expenses.filter((e) => e.Day === String(day));
          const dayDonTotal = dayDon.reduce((s, d) => s + Number(d.Amount || 0), 0);
          const dayExpTotal = dayExp.reduce((s, e) => s + Number(e.Amount || 0), 0);
          return (
            <div key={day} style={styles.dayCard}>
              <div style={styles.dayBadge}>{t("day", lang)} {day}</div>
              <div style={styles.dayRow}>
                <span style={{ color: "#059669" }}>↓ {t("inflow", lang)}</span>
                <span style={{ fontWeight: 700 }}>{formatCurrency(dayDonTotal)}</span>
              </div>
              <div style={styles.dayRow}>
                <span style={{ color: "#dc2626" }}>↑ {t("outflow", lang)}</span>
                <span style={{ fontWeight: 700 }}>{formatCurrency(dayExpTotal)}</span>

              <div style={{ ...styles.dayRow, borderTop: "1px solid #e7e5e4", paddingTop: 8, marginTop: 4 }}>

              </div>
            </div>
          );
        })}
      </div>

      {/* Recent Transactions */}
      <h3 style={styles.sectionTitle}>{t("recentTxns", lang)}</h3>
      <div style={styles.recentList}>
        {[...donations.map((d) => ({ ...d, _type: "donation" })),
        ...expenses.map((e) => ({ ...e, _type: "expense" }))]
          .sort((a, b) => b.Timestamp?.localeCompare(a.Timestamp))
          .slice(0, 5)
          .map((txn, i) => (
            <div key={i} style={styles.recentItem}>
              <div style={{
                ...styles.recentIcon,
                background: txn._type === "donation" ? "#d1fae5" : "#fee2e2",
                color: txn._type === "donation" ? "#059669" : "#dc2626",
              }}>
                {txn._type === "donation" ? "↓" : "↑"}
              </div>
              <div style={{ flex: 1 }}>
                <p style={styles.recentName}>
                  {txn._type === "donation" ? txn.DonorName : txn.Description}
                </p>
                <p style={styles.recentMeta}>{tCat(txn.Category, lang)} · {t("day", lang)} {txn.Day}</p>
              </div>
              <p style={{
                ...styles.recentAmount,
                color: txn._type === "donation" ? "#059669" : "#dc2626",

                {txn._type === "donation" ? "+" : "-"}{formatCurrency(txn.Amount)}
              </p>
            </div>
          ))}
      </div>
    </div>
  );
}

function AuctionView({ auction, families, canEdit, isAdmin, userEmail, onBid, onAddItem, showToast, lang: propLang, backend }) {
  const lang = useLang();
  const [selectedItem, setSelectedItem] = useState(null);
  const [bidForm, setBidForm] = useState({ bidderType: "Family", familyId: "", winnerName: "", amount: "" });
  const [filterStatus, setFilterStatus] = useState("All");
  const [photoViewer, setPhotoViewer] = useState(null); // { itemNo, photoUrl }
  const [uploadingPhoto, setUploadingPhoto] = useState(null); // itemNo being uploaded
  const fileInputRef = useRef(null);

  const filtered = filterStatus === "All"
    ? auction
    : filterStatus === "Unsold"
      ? auction.filter((a) => !a.Status)
      : auction.filter((a) => a.Status === filterStatus);

  const handleSubmitBid = (index) => {
    if (!bidForm.amount || !bidForm.winnerName) return;
    onBid(index, bidForm);
    setSelectedItem(null);
    setBidForm({ bidderType: "Family", familyId: "", winnerName: "", amount: "" });
  };

  const handlePhotoUpload = async (itemNo) => {
    if (!fileInputRef.current) return;
    fileInputRef.current.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        setUploadingPhoto(itemNo);
        const base64 = await compressImage(file, 600, 0.5);
        if (backend && !IS_DEMO) {
          await backend.post("uploadAuctionPhoto", { itemNo, photo: base64 });
        }
        // Update local state
        const idx = auction.findIndex((a) => String(a.ItemNo) === String(itemNo));
        if (idx >= 0) auction[idx].Photo = base64;
        if (showToast) showToast("📷 Photo uploaded!", "success");
      } catch (err) {
        console.error("Photo upload failed:", err);
        if (showToast) showToast("Photo upload failed", "error");
      } finally {
        setUploadingPhoto(null);
        fileInputRef.current.value = "";
      }
    };
    fileInputRef.current.click();
  };

  const exportAuctionCSV = () => {
    const headers = ["Item#", "Description", "Donated By", "Winner Family", "Winner Name", "Bid Amount", "Status", "Entered By", "Confirmed By"];
    const rows = (auction || []).map((a) => [a.ItemNo, a.ItemDescription, a.DonatedBy, a.WinnerFamilyID, a.WinnerName, a.BidAmount, a.Status, a.EnteredBy1, a.ConfirmedBy2]);
    exportToCSV("auction_" + new Date().toISOString().slice(0, 10) + ".csv", headers, rows);
    if (showToast) showToast(t("toastExported", lang));
  };

  const statusLabels = { All: t("filterAll", lang), Unsold: t("filterUnsold", lang), Pending: t("filterPending", lang), Confirmed: t("filterConfirmed", lang) };

  return (
    <div style={styles.page}>
      {/* Hidden file input for photo upload */}
      <input type="file" ref={fileInputRef} accept="image/*" capture="environment" style={{ display: "none" }} />

      <div style={styles.pageHeader}>
        <h2 style={styles.pageTitle}>{t("auctionTitle", lang)} ({auction.length} {t("itemsCount", lang)})</h2>
        <div style={{ display: "flex", gap: 8 }}>
          {auction.length > 0 && (
            <button onClick={exportAuctionCSV} style={{ ...styles.addBtn, background: "#f5f5f4", color: "#57534e", fontSize: 12 }}>{t("exportCSV", lang)}</button>
          )}
          {isAdmin && (
            <button onClick={onAddItem} style={styles.addBtn}>{t("addItem", lang)}</button>
          )}
        </div>
      </div>

      <div style={styles.filterRow}>
        {["All", "Unsold", "Pending", "Confirmed"].map((s) => (
          <button
            key={s}
            onClick={() => setFilterStatus(s)}
            style={{
              ...styles.filterPill,
              background: filterStatus === s ? "#292524" : "#f5f5f4",
              color: filterStatus === s ? "#fff" : "#57534e",
            }}
          >
            {statusLabels[s]}
          </button>
        ))}
      </div>

      <div style={styles.auctionInfo}>
        <span>🔐 Dual-entry required: Two different people must enter/confirm each bid.</span>
      </div>

      <div style={styles.txnList}>
        {filtered.map((item, i) => {
          const realIndex = auction.indexOf(item);
          const isPending = item.Status === "Pending";
          const isConfirmed = item.Status === "Confirmed";
          const isUnsold = !item.Status;
          const canConfirm = isPending && item.EnteredBy1 !== userEmail && canEdit;

          return (
            <div key={i} style={{
              ...styles.auctionCard,
              borderLeft: `4px solid ${isConfirmed ? "#059669" : isPending ? "#f59e0b" : "#d6d3d1"}`,
            }}>
              <div style={styles.txnTop}>
                <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                  {/* Photo thumbnail */}
                  {item.Photo ? (
                    <div onClick={() => setPhotoViewer({ itemNo: item.ItemNo, photoUrl: item.Photo })} style={{ cursor: "pointer", flexShrink: 0 }}>
                      <img src={item.Photo} alt={item.ItemDescription} style={{ width: 48, height: 48, borderRadius: 8, objectFit: "cover", border: "1px solid #e7e5e4" }} />
                    </div>
                  ) : canEdit ? (
                    <button onClick={() => handlePhotoUpload(item.ItemNo)} disabled={uploadingPhoto === item.ItemNo} style={{ width: 48, height: 48, borderRadius: 8, border: "2px dashed #d6d3d1", background: "#fafaf9", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, color: "#a8a29e", cursor: "pointer", flexShrink: 0 }}>
                      {uploadingPhoto === item.ItemNo ? "⏳" : "📷"}
                    </button>
                  ) : null}
                  <div>
                    <p style={styles.auctionItemNo}>#{item.ItemNo}</p>
                    <p style={styles.txnName}>{item.ItemDescription}</p>
                    {item.DonatedBy && <p style={styles.txnMeta}>{t("donatedBy", lang)}: {item.DonatedBy}</p>}
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  {item.BidAmount ? (
                    <p style={{ ...styles.txnAmount, color: "#059669" }}>{formatCurrency(item.BidAmount)}</p>
                  ) : (
                    <span style={styles.unsoldBadge}>Unsold</span>
                  )}
                  {item.Status && (
                    <span style={{
                      ...styles.statusBadge,
                      background: isConfirmed ? "#d1fae5" : "#fef3c7",
                      color: isConfirmed ? "#065f46" : "#92400e",
                    }}>
                      {item.Status}
                    </span>
                  )}
                </div>
              </div>

              {isPending && (
                <p style={styles.txnMeta}>
                  {t("enteredBy", lang)}: {item.EnteredBy1} · {item.WinnerName}
                  {item.WinnerFamilyID ? ` (${item.WinnerFamilyID})` : ` (${t("external", lang)})`}
                </p>
              )}
              {isConfirmed && (
                <p style={styles.txnMeta}>
                  {t("winner", lang)}: {item.WinnerName}
                  {item.WinnerFamilyID ? ` (${item.WinnerFamilyID})` : ` (${t("external", lang)})`} · ✓ {t("filterConfirmed", lang)}
                </p>
              )}

              {/* Action buttons */}
              {canEdit && isUnsold && (
                <button
                  onClick={() => { setSelectedItem(realIndex); setBidForm({ bidderType: "Family", familyId: "", winnerName: "", amount: "" }); }}
                  style={styles.bidBtn}
                >
                  Enter Bid
                </button>
              )}
              {canConfirm && (
                <button
                  onClick={() => onBid(realIndex, {
                    familyId: item.WinnerFamilyID,
                    winnerName: item.WinnerName,
                    amount: item.BidAmount,
                  })}
                  style={{ ...styles.bidBtn, background: "#059669" }}
                >
                  {t("confirmBid", lang)}
                </button>
              )}
              {isPending && item.EnteredBy1 === userEmail && (
                <p style={{ ...styles.txnMeta, color: "#b45309", fontStyle: "italic" }}>
                  {t("waitingConfirm", lang)}
                </p>
              )}

              {/* Bid entry form (inline) */}
              {selectedItem === realIndex && (
                <div style={styles.inlineBidForm}>
                  {/* Bidder type toggle */}
                  <div style={{ display: "flex", gap: 6 }}>
                    {["Family", "External"].map((tp) => (
                      <button
                        key={tp}
                        onClick={() => setBidForm({ ...bidForm, bidderType: tp, familyId: "", winnerName: "" })}
                        style={{
                          ...styles.filterPill,
                          flex: 1,
                          textAlign: "center",
                          background: bidForm.bidderType === tp ? "#292524" : "#f5f5f4",
                          color: bidForm.bidderType === tp ? "#fff" : "#57534e",
                          padding: "8px 12px",
                          fontSize: 12,
                        }}
                      >
                        {tp === "Family" ? t("bidFamily", lang) : t("bidExternal", lang)}
                      </button>
                    ))}
                  </div>

                  {/* Family selector (only for Family type) */}
                  {bidForm.bidderType === "Family" && (
                    <select
                      value={bidForm.familyId}
                      onChange={(e) => {
                        const fam = families.find((f) => f.FamilyID === e.target.value);
                        setBidForm({ ...bidForm, familyId: e.target.value, winnerName: fam?.FamilyName || "" });
                      }}
                      style={styles.input}
                    >
                      <option value="">{t("selectFamily", lang)}</option>
                      {families.map((f) => (
                        <option key={f.FamilyID} value={f.FamilyID}>
                          {f.FamilyName} ({f.FamilyID})
                        </option>
                      ))}
                    </select>
                  )}

                  <input
                    placeholder={bidForm.bidderType === "Family" ? t("winnerName", lang) : t("externalBidder", lang)}
                    value={bidForm.winnerName}
                    onChange={(e) => setBidForm({ ...bidForm, winnerName: e.target.value })}
                    style={styles.input}
                  />
                  <input
                    type="number"
                    placeholder={t("bidAmount", lang)}
                    value={bidForm.amount}
                    onChange={(e) => setBidForm({ ...bidForm, amount: e.target.value })}
                    style={styles.input}
                  />
                  <div style={{ display: "flex", gap: 8 }}>
                    <button
                      onClick={() => handleSubmitBid(realIndex)}
                      style={styles.btnPrimary}
                    >
                      {t("submitBid", lang)}
                    </button>
                    <button
                      onClick={() => setSelectedItem(null)}
                      style={styles.btnSecondary}
                    >
                      {t("cancel", lang)}
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Photo Viewer Modal */}
      {photoViewer && (
        <div onClick={() => setPhotoViewer(null)} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.85)", zIndex: 1001, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div onClick={(e) => e.stopPropagation()} style={{ maxWidth: 500, width: "100%", background: "#fff", borderRadius: 16, overflow: "hidden" }}>
            <img src={photoViewer.photoUrl} alt={"Item #" + photoViewer.itemNo} style={{ width: "100%", maxHeight: "70vh", objectFit: "contain" }} />
            <div style={{ padding: 12, textAlign: "center" }}>
              <button onClick={() => setPhotoViewer(null)} style={{ background: "#292524", color: "#fff", border: "none", borderRadius: 8, padding: "8px 24px", fontSize: 14, cursor: "pointer" }}>
                {t("cancel", lang)}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function DonationForm({ families, onSubmit, onClose }) {
  const lang = useLang();
  const thisYear = new Date().getFullYear();
  const [form, setForm] = useState({
    year: String(thisYear),
    day: "1",
    donorType: "Family",
    familyId: "",
    donorName: "",
    category: DONATION_CATEGORIES[0],
    amount: "",
    description: "",
  });

  const set = (k, v) => setForm({ ...form, [k]: v });

  return (
    <Modal title={t("recordDonation", lang)} onClose={onClose}>
      <div style={styles.formGrid}>
        <label style={styles.label}>{t("year", lang)}
          <select value={form.year} onChange={(e) => set("year", e.target.value)} style={styles.input}>
            {Array.from({ length: 5 }, (_, i) => thisYear - 2 + i).map((y) => (
              <option key={y} value={String(y)}>{y}</option>
            ))}
          </select>
        </label>
        <label style={styles.label}>{t("day", lang)}
          <select value={form.day} onChange={(e) => set("day", e.target.value)} style={styles.input}>
            <option value="1">{t("day1", lang)}</option>
            <option value="2">{t("day2", lang)}</option>
            <option value="3">{t("day3", lang)}</option>
          </select>
        </label>
        <label style={styles.label}>{t("donorType", lang)}
          <select value={form.donorType} onChange={(e) => set("donorType", e.target.value)} style={styles.input}>
            <option value="Family">{t("family", lang)}</option>
            <option value="External">{t("external", lang)}</option>
          </select>
        </label>
        {form.donorType === "Family" && (
          <label style={styles.label}>{t("family", lang)}
            <select
              value={form.familyId}
              onChange={(e) => {
                const fam = families.find((f) => f.FamilyID === e.target.value);
                set("familyId", e.target.value);
                if (fam) set("donorName", fam.FamilyName);
              }}
              style={styles.input}
            >
              <option value="">{t("select", lang)}</option>
              {families.map((f) => (
                <option key={f.FamilyID} value={f.FamilyID}>{f.FamilyName}</option>
              ))}
            </select>
          </label>
        )}
        <label style={styles.label}>{t("donorName", lang)}
          <input value={form.donorName} onChange={(e) => set("donorName", e.target.value)} style={styles.input} placeholder={t("nameOfDonor", lang)} />
        </label>
        <label style={styles.label}>{t("category", lang)}
          <select value={form.category} onChange={(e) => set("category", e.target.value)} style={styles.input}>
            {DONATION_CATEGORIES.map((c) => <option key={c} value={c}>{tCat(c, lang)}</option>)}
          </select>
        </label>
        {form.category !== "Objects for Auction" && (
          <label style={styles.label}>{t("amount", lang)} (₹)
            <input type="number" value={form.amount} onChange={(e) => set("amount", e.target.value)} style={styles.input} placeholder="0" />
          </label>
        )}
        <label style={styles.label}>{form.category === "Objects for Auction" ? t("objectName", lang) : t("descOptional", lang)}
          <input value={form.description} onChange={(e) => set("description", e.target.value)} style={styles.input} placeholder={form.category === "Objects for Auction" ? (lang === "ta" ? "எ.கா. மஞ்சள், உப்பு" : "e.g. Turmeric, Salt") : t("notes", lang)} />
        </label>
      </div>
      <button
        onClick={() => {
          const isAuctionObj = form.category === "Objects for Auction";
          if (form.donorName && (isAuctionObj || form.amount)) onSubmit({ ...form, amount: isAuctionObj ? "0" : form.amount });
        }}
        style={{ ...styles.btnPrimary, width: "100%", marginTop: 16 }}
        disabled={!form.donorName || (form.category !== "Objects for Auction" && !form.amount)}
      >
        {t("saveDonation", lang)}
      </button>
    </Modal>
  );
}

    sections.push("--- INCOME ---");
    sections.push("Date,Day,Donor Type,Family ID,Donor Name,Category,Amount,Description,Entered By");
    (donations || []).forEach((d) => sections.push([d.Year, d.Day, d.DonorType, d.FamilyID, d.DonorName, d.Category, d.Amount, d.Description, d.EnteredBy].map((v) => '"' + String(v || "").replace(/"/g, '""') + '"').join(",")));
    sections.push("");
    // Expenses
    sections.push("--- EXPENSES ---");
    sections.push("Date,Day,Category,Description,Amount,Vendor,Entered By");
    (expenses || []).forEach((e) => sections.push([e.Year, e.Day, e.Category, e.Description, e.Amount, e.Vendor, e.EnteredBy].map((v) => '"' + String(v || "").replace(/"/g, '""') + '"').join(",")));
    sections.push("");
    // Auction
    sections.push("--- AUCTION ---");
    sections.push("Item#,Description,Donated By,Winner Family,Winner Name,Bid Amount,Status");
    (auction || []).forEach((a) => sections.push([a.ItemNo, a.ItemDescription, a.DonatedBy, a.WinnerFamilyID, a.WinnerName, a.BidAmount, a.Status].map((v) => '"' + String(v || "").replace(/"/g, '""') + '"').join(",")));
    sections.push("");
    // Summary
    sections.push("--- SUMMARY ---");
    sections.push("Total Income," + totalDonations);
    sections.push("Total Auction," + totalAuction);
    sections.push("Total Expenses," + totalExpenses);
    sections.push("Net Balance," + balance);

    const blob = new Blob(["\uFEFF" + sections.join("\n")], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "prayer_event_full_" + new Date().toISOString().slice(0, 10) + ".csv";
    a.click();
    URL.revokeObjectURL(url);
    if (showToast) showToast(t("toastExported", lang));
  };

  return (
    <div style={styles.page}>
      <div style={styles.pageHeader}>
        <h2 style={styles.pageTitle}>{t("reports", lang)}</h2>
        <button onClick={exportAllData} style={{ ...styles.addBtn, background: "#292524", fontSize: 12 }}>{t("exportAll", lang)}</button>
      </div>

      {/* Report selector */}
      <div style={styles.filterRow}>
        {[
          { id: "address", label: t("addressBook", lang) },
          { id: "auction_balance", label: t("auctionBalance", lang) },
          { id: "year_on_year", label: t("yearOnYear", lang) },
        ].map((r) => (
          <button
            key={r.id}
            onClick={() => setActiveReport(r.id)}
            style={{
              ...styles.reportTab,
              background: activeReport === r.id ? "#292524" : "#fff",
              color: activeReport === r.id ? "#fff" : "#57534e",
              border: activeReport === r.id ? "1px solid #292524" : "1px solid #d6d3d1",
            }}
          >
            {r.label}
          </button>
        ))}
      </div>

      {activeReport === "address" && <AddressReport families={families} />}
      {activeReport === "auction_balance" && (
        <AuctionBalanceSheet
          auction={auction}
          families={families}
          donations={donations}
          expenses={expenses}
          totalDonations={totalDonations}
          totalExpenses={totalExpenses}
          totalAuction={totalAuction}
          balance={balance}
        />
      )}
      {activeReport === "year_on_year" && (
        <YearOnYearReport
          ledger={ledger}
          currentYear={currentYear}
          totalDonations={totalDonations}
          totalExpenses={totalExpenses}
          totalAuction={totalAuction}
          balance={balance}
        />
      )}
    </div>
  );
}

// --- Year on Year Report ---
function YearOnYearReport({ ledger, currentYear, totalDonations, totalExpenses, totalAuction, balance }) {
  const lang = useLang();
  const fmt = (v) => "₹" + Number(v || 0).toLocaleString("en-IN");

  // Build rows: historical from ledger + current year live
  const historicalRows = (ledger || [])
    .filter((r) => r.Year && String(r.Year) !== String(currentYear))
    .map((r) => ({
      year: String(r.Year),
      opening: Number(r.OpeningBalance) || 0,
      donations: Number(r.TotalDonations) || 0,
      auction: Number(r.TotalAuction) || 0,
      expenses: Number(r.TotalExpenses) || 0,
      closing: Number(r.ClosingBalance) || 0,
      isLive: false,
    }));

  // Current year from ledger (for opening balance) or default 0
  const currentLedger = (ledger || []).find((r) => String(r.Year) === String(currentYear));
  const currentRow = {
    year: String(currentYear),
    opening: currentLedger ? Number(currentLedger.OpeningBalance) || 0 : 0,
    donations: totalDonations,
    auction: totalAuction,
    expenses: totalExpenses,
    closing: (currentLedger ? Number(currentLedger.OpeningBalance) || 0 : 0) + totalDonations + totalAuction - totalExpenses,
    isLive: true,
  };

  const allRows = [...historicalRows, currentRow].sort((a, b) => Number(a.year) - Number(b.year));

  if (allRows.length === 0) {
    return <p style={{ textAlign: "center", color: "#a8a29e", padding: 32 }}>{t("noLedgerData", lang)}</p>;
  }

  // Calculate growth percentages
  const withGrowth = allRows.map((row, i) => {
    if (i === 0) return { ...row, donGrowth: null, expGrowth: null };
    const prev = allRows[i - 1];
    const donGrowth = prev.donations > 0 ? ((row.donations - prev.donations) / prev.donations * 100) : null;
    const expGrowth = prev.expenses > 0 ? ((row.expenses - prev.expenses) / prev.expenses * 100) : null;
    return { ...row, donGrowth, expGrowth };
  });

  const growthBadge = (pct) => {
    if (pct === null || pct === undefined) return "—";
    const color = pct >= 0 ? "#16a34a" : "#dc2626";
    const arrow = pct >= 0 ? "▲" : "▼";
    return React.createElement("span", { style: { color, fontSize: 11, fontWeight: 600 } },
      arrow + " " + Math.abs(pct).toFixed(0) + "%"
    );
  };

  return (
    <div>
      <div style={styles.reportHeader}>
        <h3 style={styles.reportTitle}>{t("yearOnYearTitle", lang)}</h3>
      </div>

      {/* Summary cards for quick comparison */}
      {allRows.length >= 2 && (() => {
        const latest = allRows[allRows.length - 1];
        const prev = allRows[allRows.length - 2];
        const totalLatest = latest.donations + latest.auction;
        const totalPrev = prev.donations + prev.auction;
        const incomeChange = totalPrev > 0 ? ((totalLatest - totalPrev) / totalPrev * 100) : 0;
        return (
          <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap" }}>
            <div style={{ flex: 1, minWidth: 140, background: incomeChange >= 0 ? "#f0fdf4" : "#fef2f2", borderRadius: 12, padding: "12px 16px" }}>
              <p style={{ fontSize: 11, color: "#78716c", margin: 0 }}>{t("totalIncome", lang)} vs {prev.year}</p>
              <p style={{ fontSize: 20, fontWeight: 700, margin: "4px 0", color: incomeChange >= 0 ? "#16a34a" : "#dc2626" }}>
                {incomeChange >= 0 ? "▲" : "▼"} {Math.abs(incomeChange).toFixed(1)}%
              </p>
              <p style={{ fontSize: 11, color: "#a8a29e", margin: 0 }}>{fmt(totalLatest)} vs {fmt(totalPrev)}</p>
            </div>
            <div style={{ flex: 1, minWidth: 140, background: latest.closing >= prev.closing ? "#f0fdf4" : "#fef2f2", borderRadius: 12, padding: "12px 16px" }}>
              <p style={{ fontSize: 11, color: "#78716c", margin: 0 }}>{t("closingBalance", lang)}</p>
              <p style={{ fontSize: 20, fontWeight: 700, margin: "4px 0", color: "#292524" }}>{fmt(latest.closing)}</p>
              <p style={{ fontSize: 11, color: "#a8a29e", margin: 0 }}>{prev.year}: {fmt(prev.closing)}</p>
            </div>
          </div>
        );
      })()}

      {/* Visual Bar Chart */}
      {allRows.length >= 2 && (() => {
        const maxVal = Math.max(...allRows.map((r) => Math.max(r.donations + r.auction, r.expenses, r.closing)));
        const barH = (val) => maxVal > 0 ? Math.max(4, (val / maxVal) * 120) : 4;
        return (
          <div style={{ marginBottom: 20, padding: 16, background: "#fafaf9", borderRadius: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-around", alignItems: "flex-end", height: 160, gap: 4 }}>
              {allRows.map((row) => (
                <div key={row.year} style={{ flex: 1, maxWidth: 80, textAlign: "center" }}>
                  <div style={{ display: "flex", justifyContent: "center", gap: 3, alignItems: "flex-end", height: 130 }}>
                    <div style={{ width: 14, height: barH(row.donations + row.auction), background: "#059669", borderRadius: "4px 4px 0 0", transition: "height 0.3s" }} title={t("totalIncome", lang) + ": " + fmt(row.donations + row.auction)} />
                    <div style={{ width: 14, height: barH(row.expenses), background: "#dc2626", borderRadius: "4px 4px 0 0", transition: "height 0.3s" }} title={t("totalExpenses", lang) + ": " + fmt(row.expenses)} />
                    <div style={{ width: 14, height: barH(Math.abs(row.closing)), background: row.closing >= 0 ? "#2563eb" : "#f59e0b", borderRadius: "4px 4px 0 0", transition: "height 0.3s" }} title={t("closingBalance", lang) + ": " + fmt(row.closing)} />
                  </div>
                  <p style={{ fontSize: 11, fontWeight: row.isLive ? 700 : 500, color: row.isLive ? "#d97706" : "#78716c", margin: "6px 0 0" }}>
                    {row.year}{row.isLive ? "*" : ""}
                  </p>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", justifyContent: "center", gap: 16, marginTop: 10, fontSize: 11, color: "#78716c" }}>
              <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#059669", borderRadius: 2, marginRight: 4 }}/>{t("totalIncome", lang)}</span>
              <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#dc2626", borderRadius: 2, marginRight: 4 }}/>{t("expenses", lang)}</span>
              <span><span style={{ display: "inline-block", width: 10, height: 10, background: "#2563eb", borderRadius: 2, marginRight: 4 }}/>{t("closingBalance", lang)}</span>
            </div>
          </div>
        );
      })()}

      {/* Year-on-Year table */}
      <div style={styles.tableWrapper}>
        <table style={styles.table}>
          <thead>
            <tr>
              <th style={{ ...styles.th, width: "12%" }}>{t("year", lang)}</th>
              <th style={{ ...styles.th, width: "16%", textAlign: "right" }}>{t("openingBalance", lang)}</th>
              <th style={{ ...styles.th, width: "18%", textAlign: "right" }}>{t("donations", lang)}</th>
              <th style={{ ...styles.th, width: "16%", textAlign: "right" }}>{t("auctionTitle", lang)}</th>
              <th style={{ ...styles.th, width: "18%", textAlign: "right" }}>{t("expenses", lang)}</th>
              <th style={{ ...styles.th, width: "20%", textAlign: "right" }}>{t("closingBalance", lang)}</th>
            </tr>
          </thead>
          <tbody>
            {withGrowth.map((row, i) => (
              <tr key={row.year} style={row.isLive ? { background: "#fffbeb" } : (i % 2 === 0 ? styles.trEven : styles.trOdd)}>
                <td style={{ ...styles.td, fontWeight: 700 }}>
                  {row.year}
                  {row.isLive && <span style={{ display: "block", fontSize: 10, color: "#d97706", fontWeight: 400 }}>{t("currentYearLive", lang)}</span>}
                </td>
                <td style={{ ...styles.td, textAlign: "right", fontFamily: "monospace" }}>{fmt(row.opening)}</td>
                <td style={{ ...styles.td, textAlign: "right" }}>
                  <span style={{ fontFamily: "monospace" }}>{fmt(row.donations)}</span>
                  {row.donGrowth !== null && <span style={{ display: "block", marginTop: 2 }}>{growthBadge(row.donGrowth)}</span>}
                </td>
                <td style={{ ...styles.td, textAlign: "right", fontFamily: "monospace" }}>{fmt(row.auction)}</td>
                <td style={{ ...styles.td, textAlign: "right" }}>
                  <span style={{ fontFamily: "monospace" }}>{fmt(row.expenses)}</span>
                  {row.expGrowth !== null && <span style={{ display: "block", marginTop: 2 }}>{growthBadge(row.expGrowth)}</span>}
                </td>
                <td style={{ ...styles.td, textAlign: "right", fontWeight: 700, fontFamily: "monospace", color: row.closing >= 0 ? "#16a34a" : "#dc2626" }}>
                  {fmt(row.closing)}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// --- Auction Balance Sheet ---
function AuctionBalanceSheet({ auction, families, donations, expenses, totalDonations, totalExpenses, totalAuction, balance }) {
  const lang = useLang();
  const confirmedItems = auction.filter((a) => a.Status === "Confirmed");
  const pendingItems = auction.filter((a) => a.Status === "Pending");
  const unsoldItems = auction.filter((a) => !a.Status);
  const pendingTotal = pendingItems.reduce((s, a) => s + Number(a.BidAmount || 0), 0);

  // Group auction by family / external
  const bidderTotals = {};
  confirmedItems.forEach((item) => {
    const key = item.WinnerFamilyID || `EXT-${item.WinnerName}`;
    if (!bidderTotals[key]) {
      bidderTotals[key] = {
        name: item.WinnerName,
        isExternal: !item.WinnerFamilyID,
        items: 0,
        total: 0,
      };
    }
    bidderTotals[key].items += 1;
    bidderTotals[key].total += Number(item.BidAmount || 0);
  });

  return (
    <div>
      {/* Overall Event Summary */}
      <div style={styles.reportHeader}>
        <h3 style={styles.reportTitle}>{t("eventBalanceSheet", lang)}</h3>
      </div>

      <div style={styles.balanceSheet}>
        {/* Income side */}
        <div style={styles.bsSection}>
          <div style={styles.bsSectionHeader}>
            <span style={styles.bsSectionIcon}>↓</span>
            <span style={styles.bsSectionTitle}>{t("income", lang)}</span>
          </div>
          <div style={styles.bsRow}>
            <span>{t("donations", lang)}</span>
            <span style={styles.bsAmount}>{formatCurrency(totalDonations)}</span>
          </div>
          <div style={styles.bsRow}>
            <span>{t("auctionConfirmed", lang)}</span>
            <span style={styles.bsAmount}>{formatCurrency(totalAuction)}</span>
          </div>
          {pendingTotal > 0 && (
            <div style={{ ...styles.bsRow, color: "#b45309" }}>
              <span>{t("auctionPending", lang)}</span>
              <span style={styles.bsAmount}>{formatCurrency(pendingTotal)}</span>
            </div>
          )}
          <div style={styles.bsTotalRow}>
            <span>{t("totalIncome", lang)}</span>
            <span style={{ ...styles.bsAmount, fontWeight: 800 }}>
              {formatCurrency(totalDonations + totalAuction)}
            </span>
          </div>
        </div>

        {/* Expense side */}
        <div style={styles.bsSection}>
          <div style={styles.bsSectionHeader}>
            <span style={{ ...styles.bsSectionIcon, background: "#fee2e2", color: "#dc2626" }}>↑</span>
            <span style={styles.bsSectionTitle}>{t("expensesLabel", lang)}</span>
          </div>
          <div style={styles.bsRow}>
            <span>{t("totalExpenses", lang)}</span>
            <span style={styles.bsAmount}>{formatCurrency(totalExpenses)}</span>
          </div>
          <div style={styles.bsTotalRow}>
            <span>{t("totalOutflow", lang)}</span>
            <span style={{ ...styles.bsAmount, fontWeight: 800 }}>
              {formatCurrency(totalExpenses)}
            </span>
          </div>
        </div>

        {/* Net */}
        <div style={{
          ...styles.bsNetRow,
          background: balance >= 0
            ? "linear-gradient(135deg, #065f46, #059669)"
            : "linear-gradient(135deg, #991b1b, #dc2626)",
        }}>
          <span>{t("netBalanceLabel", lang)}</span>
          <span style={{ fontSize: 20, fontWeight: 800 }}>{formatCurrency(balance)}</span>
        </div>
      </div>

      {/* Auction Status Summary */}
      <div style={styles.reportHeader}>
        <h3 style={{...styles.reportTitle, marginTop: 24}}>{t("auctionSummary", lang)}</h3>
      </div>

      <div style={styles.auctionSummaryGrid}>
        <div style={{ ...styles.auctionSummaryCard, borderLeft: "4px solid #059669" }}>
          <p style={styles.asStat}>{confirmedItems.length}</p>
          <p style={styles.asLabel}>{t("confirmedLabel", lang)}</p>
          <p style={styles.asAmount}>{formatCurrency(totalAuction)}</p>
        </div>
        <div style={{ ...styles.auctionSummaryCard, borderLeft: "4px solid #f59e0b" }}>
          <p style={styles.asStat}>{pendingItems.length}</p>
          <p style={styles.asLabel}>{t("pendingLabel", lang)}</p>
          <p style={styles.asAmount}>{formatCurrency(pendingTotal)}</p>
        </div>
        <div style={{ ...styles.auctionSummaryCard, borderLeft: "4px solid #d6d3d1" }}>
          <p style={styles.asStat}>{unsoldItems.length}</p>
          <p style={styles.asLabel}>{t("unsoldLabel", lang)}</p>
          <p style={styles.asAmount}>—</p>
        </div>
      </div>

      {/* Auction by Bidder */}
      {Object.keys(bidderTotals).length > 0 && (
        <>
          <div style={styles.reportHeader}>
            <h3 style={{ ...styles.reportTitle, marginTop: 24 }}>{t("auctionByBidder", lang)}</h3>
          </div>
          <div style={styles.tableWrapper}>
            <table style={styles.table}>
              <thead>
                <tr>
                  <th style={styles.th}>{t("bidder", lang)}</th>
                  <th style={{ ...styles.th, textAlign: "center" }}>{t("itemsWon", lang)}</th>
                  <th style={{ ...styles.th, textAlign: "right" }}>{t("totalAmount", lang)}</th>
                </tr>
              </thead>
              <tbody>
                {Object.entries(bidderTotals)
                  .sort((a, b) => b[1].total - a[1].total)
                  .map(([key, data], i) => (
                    <tr key={i} style={i % 2 === 0 ? styles.trEven : styles.trOdd}>
                      <td style={styles.td}>
                        <p style={styles.tableName}>{data.name}</p>
                        <p style={styles.tableAddr}>
                          {data.isExternal ? t("bidExternal", lang) : `🏠 ${key}`}
                        </p>
                      </td>
                      <td style={{ ...styles.td, textAlign: "center", fontWeight: 700 }}>{data.items}</td>
                      <td style={{ ...styles.td, textAlign: "right", fontWeight: 700, color: "#059669" }}>
                        {formatCurrency(data.total)}
                      </td>
                    </tr>
                  ))}
                <tr style={styles.trTotal}>
                  <td style={{ ...styles.td, fontWeight: 800 }}>{t("total", lang).toUpperCase()}</td>
                  <td style={{ ...styles.td, textAlign: "center", fontWeight: 800 }}>
                    {confirmedItems.length}
                  </td>
                  <td style={{ ...styles.td, textAlign: "right", fontWeight: 800, color: "#059669" }}>
                    {formatCurrency(totalAuction)}
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </>
      )}

      {/* Auction Item-wise Detail */}
      {confirmedItems.length > 0 && (
        <>
          <div style={styles.reportHeader}>
            <h3 style={{ ...styles.reportTitle, marginTop: 24 }}>{t("auctionItemDetails", lang)}</h3>
          </div>
          <div style={styles.tableWrapper}>
            <table style={styles.table}>
              <thead>
                <tr>
                  <th style={{ ...styles.th, width: "10%" }}>#</th>
                  <th style={styles.th}>{t("item", lang)}</th>
                  <th style={styles.th}>{t("winner", lang)}</th>
                  <th style={{ ...styles.th, textAlign: "right" }}>{t("amount", lang)}</th>
                </tr>
              </thead>
              <tbody>
                {confirmedItems.map((item, i) => (
                  <tr key={i} style={i % 2 === 0 ? styles.trEven : styles.trOdd}>
                    <td style={{ ...styles.td, fontWeight: 700, color: "#b45309" }}>{item.ItemNo}</td>
                    <td style={styles.td}>{item.ItemDescription}</td>
                    <td style={styles.td}>
                      <p style={styles.tableName}>{item.WinnerName}</p>
                      <p style={styles.tableAddr}>
                        {item.WinnerFamilyID ? `🏠 ${item.WinnerFamilyID}` : t("bidExternal", lang)}
                      </p>
                    </td>
                    <td style={{ ...styles.td, textAlign: "right", fontWeight: 700, color: "#059669" }}>
                      {formatCurrency(item.BidAmount)}
                    </td>
                  </tr>
                ))}
                <tr style={styles.trTotal}>
                  <td style={styles.td}></td>
                  <td style={{ ...styles.td, fontWeight: 800 }}>{t("total", lang).toUpperCase()}</td>
                  <td style={styles.td}></td>
                  <td style={{ ...styles.td, textAlign: "right", fontWeight: 800, color: "#059669", fontSize: 15 }}>
                    {formatCurrency(totalAuction)}
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </>
      )}

      {pendingTotal > 0 && (
        <p style={{ ...styles.txnMeta, marginTop: 12, color: "#b45309", fontStyle: "italic" }}>
          {t("pendingDisclaimer", lang).replace("{amount}", formatCurrency(pendingTotal))}
        </p>
      )}
    </div>
  );
}

            <li><strong>Expenses</strong> — TxnID, Date, Day, Category, Description, Amount, Vendor, EnteredBy, Timestamp</li>
            <li><strong>Auction</strong> — ItemNo, ItemDescription, DonatedBy, WinnerFamilyID, WinnerName, BidAmount, EnteredBy1, ConfirmedBy2, Timestamp1, Timestamp2, Status</li>
            <li><strong>Ledger</strong> — Year, OpeningBalance, TotalDonations, TotalAuction, TotalExpenses, ClosingBalance</li>
            <li><strong>AccessControl</strong> — Email, Role, Name</li>
            <li><strong>AuditLog</strong> — Timestamp, User, Action, Module, Details</li>
          </ul>
          <p><strong>Step 4:</strong> In the <strong>AccessControl</strong> sheet, add your Google email with Role = Admin.</p>
          <p><strong>Step 5:</strong> In the <strong>Auction</strong> sheet, review the 48 pre-filled items. Add or remove as needed.</p>
          <p><strong>Step 6:</strong> Go to <strong>Extensions → Apps Script</strong>, paste the backend code (Code.gs), and deploy as Web App.</p>
          <p><strong>Step 7:</strong> Replace the 2 constants at the top of this code: <code>GOOGLE_CLIENT_ID</code> and <code>APPS_SCRIPT_URL</code>.</p>
          <p style={{ marginTop: 12, color: "#b45309" }}>
            <strong>💡 Tip:</strong> No API key or Spreadsheet ID needed. The Apps Script backend handles all data access securely.
            The Google Sheet stays private — only you can see it in Drive.
          </p>

  );
}
